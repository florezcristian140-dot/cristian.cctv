<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f6f8;--bg2:#ffffff;--bg3:#ffffff;--bg4:#f1f3f7;
  --b1:#e5e7eb;--b2:#d1d5db;--b3:#9ca3af;

}
html,body,#root{height:100%;background:var(--bg);color:var(--txt);font-family:var(--fb);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
.app{display:flex;height:100vh;overflow:hidden;}
.sb{width:232px;min-width:232px;background:var(--bg2);border-right:1px solid var(--b1);display:flex;flex-direction:column;}
.sb-logo{padding:18px 17px 15px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;}

.logo-t{font-family:var(--fh);font-size:15px;font-weight:800;line-height:1.15;color:var(--txt);}

.nav{padding:10px 9px;flex:1;overflow-y:auto;}

.ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--r);cursor:pointer;font-family:var(--fh);font-size:14px;font-weight:600;color:var(--txt2);transition:all .13s;border:none;background:none;width:100%;text-align:left;margin-bottom:1px;}
.ni:hover{color:var(--txt);background:var(--bg4);}
.ni.on{color:var(--acc);background:var(--acc-dim);}

.main{flex:1;overflow-y:auto;}
.page{padding:26px 30px;max-width:1180px;}
.ph{margin-bottom:22px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}

.bp{background:var(--acc);color:#fff;}.bp:hover{background:var(--acc-h);box-shadow:var(--acc-glow);}

.bgrn{background:var(--grn-dim);color:var(--grn);border:1px solid rgba(5,150,105,.25);}
.bprp{background:var(--prp-dim);color:var(--prp);border:1px solid rgba(124,58,237,.25);}
.bblu{background:var(--blu-dim);color:var(--blu);border:1px solid rgba(37,99,235,.25);}

.bsm{padding:5px 11px;font-size:12px;}
.bic{padding:7px;width:31px;height:31px;justify-content:center;}

.inp,.sel,.ta{background:#fff;border:1px solid var(--b2);border-radius:var(--r);color:var(--txt);font-family:var(--fb);font-size:13px;padding:8px 11px;outline:none;transition:border-color .13s,box-shadow .13s;width:100%;}

.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-family:var(--fm);font-weight:500;}

.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sc.bl::before{background:var(--acc)}.sc.gr::before{background:var(--grn)}.sc.yl::before{background:var(--ylw)}.sc.rd::before{background:var(--red)}.sc.pu::before{background:var(--prp)}
.sl{font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--txt3);margin-bottom:7px;}
.sv{font-family:var(--fh);font-size:24px;font-weight:800;color:var(--txt);}
.ss{font-size:11px;color:var(--txt2);margin-top:2px;}
.qi{display:grid;grid-template-columns:1fr 78px 118px 33px;gap:7px;align-items:center;padding:9px 11px;background:var(--bg4);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:5px;}
.tb2{background:var(--bg4);border:1px solid var(--b1);border-radius:var(--r2);padding:13px 17px;}
.tr2{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;}
.tr2.fin{border-top:1px solid var(--b2);margin-top:7px;padding-top:10px;font-family:var(--fh);font-size:17px;font-weight:800;color:var(--txt);}
.sw{position:relative;}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;stroke:var(--txt3);}
.si{padding-left:33px;}
.img-upload{border:2px dashed var(--b2);border-radius:var(--r);padding:11px;cursor:pointer;transition:border-color .13s;display:flex;align-items:center;gap:9px;background:var(--bg4);}

.img-th{width:40px;height:40px;object-fit:contain;border-radius:5px;border:1px solid var(--b1);background:#fff;}

::-webkit-scrollbar{width:8px;height:8px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px;}::-webkit-scrollbar-thumb:hover{background:var(--b3);}

.fm{font-family:var(--fm);letter-spacing:0.5px;font-variant-numeric:tabular-nums;}.fw6{font-weight:600;}.fw7{font-weight:700;}
.tc{color:var(--acc);}.tg{color:var(--grn);}.ty{color:var(--ylw);}
.ts{font-size:12px;}.txs{font-size:11px;}.t2{color:var(--txt2);}.t3{color:var(--txt3);}

.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}

.login-sub{font-size:12px;color:var(--txt3);margin-top:2px;}

.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.prod-card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r2);overflow:hidden;transition:all .15s;}

.prod-card-price{font-family:var(--fh);font-size:18px;font-weight:800;color:var(--acc);letter-spacing:-0.5px;}
.cart-btn{width:100%;margin-top:8px;justify-content:center;}
.floating-cart-btn{position:fixed;bottom:24px;right:24px;z-index:70;width:64px;height:64px;border-radius:50%;background:var(--acc);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(220,38,38,.4);transition:all .2s;font-size:24px;}
.floating-cart-btn:hover{transform:scale(1.1);box-shadow:0 12px 32px rgba(220,38,38,.5);}
.floating-cart-badge{position:absolute;top:-4px;right:-4px;background:#fff;color:var(--acc);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;border:3px solid var(--acc);font-family:var(--fm);}
@media(max-width:980px){.page{padding:20px 22px;}.sg{grid-template-columns:repeat(2,1fr);}.gr3{grid-template-columns:1fr 1fr;}}
@media(max-width:720px){
  .app{flex-direction:column;height:100vh;position:relative;}
  .sb{width:100%;min-width:0;flex-direction:row;border-right:none;border-bottom:1px solid var(--b1);align-items:center;flex-shrink:0;height:54px;padding:0 12px;position:relative;}
  .sb>div:last-child{display:none;}.sb-logo{padding:0;border:none;flex:1;min-width:0;}
  .logo-t{font-size:14px;}.logo-ic{width:30px;height:30px;border-radius:7px;}.logo-s{display:none;}
  .nav{display:none;position:absolute;top:54px;left:0;right:0;background:var(--bg2);border-bottom:1px solid var(--b1);box-shadow:var(--shad);z-index:90;padding:10px;flex:none;max-height:calc(100vh - 54px);}
  .nav.open{display:block;}.nav-sec{display:none;}.ni{padding:11px 13px;font-size:15px;}
  .mob-toggle{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid var(--b2);background:#fff;border-radius:var(--r);cursor:pointer;color:var(--txt2);}
  .main{flex:1;overflow-y:auto;}.page{padding:16px 14px;}.pt{font-size:21px;}.ph{margin-bottom:16px;}
  .card{padding:14px;}.sg{grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:16px;}.sc{padding:12px 14px;}.sv{font-size:20px;}
  .gr2,.gr3{grid-template-columns:1fr;}
  .qi{grid-template-columns:1fr 1fr 33px;gap:6px;padding:10px;}.qi>:nth-child(1){grid-column:1/-1;}
  .modal{padding:18px;}.mt2{font-size:17px;margin-bottom:13px;}.mf{flex-direction:column-reverse;}.mf .btn{width:100%;justify-content:center;}
  th,td{padding:8px 9px;font-size:12px;}.btn{padding:9px 14px;font-size:13px;}.bsm{padding:6px 10px;font-size:11px;}
  .filters-row{grid-template-columns:1fr 1fr !important;}.filters-row .sw{grid-column:1/-1;}.filters-row>button{grid-column:1/-1;}
  .stk-mob{grid-template-columns:1fr !important;}.cart-sidebar{width:100%;}
  .floating-cart-btn{width:56px;height:56px;bottom:16px;right:16px;font-size:20px;}
  .floating-cart-badge{width:24px;height:24px;font-size:11px;border-width:2px;}
}
@media print{.sb,.no-print,.mob-toggle{display:none!important;}body,.app,.main{background:white!important;color:#111!important;height:auto!important;overflow:visible!important;}}
</style>

<script type="text/babel">
// ─── CCTV Pro Cotizador — app.js ──────────────────────────────────────────────
// Arquitectura: React 18 (UMD) + Firebase Firestore/Auth + EmailJS
// Roles: admin | installer | guest (sin login)
// ─────────────────────────────────────────────────────────────────────────────

const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

// ═══════════════════════════════════════════════════════════════════════════════
// SECCIÓN 1 — FIREBASE / STORAGE LAYER
// ═══════════════════════════════════════════════════════════════════════════════

let db = null, fbAuth = null;

function initFirebase() {
  if (!window.USE_FIREBASE) return;
  try {
    if (!firebase.apps.length) firebase.initializeApp(window.FIREBASE_CONFIG);
    db = firebase.firestore();
    fbAuth = firebase.auth();
  } catch(e) { console.warn("Firebase init error:", e); window.USE_FIREBASE = false; }
}
initFirebase();

// LocalStorage keys (fallback)
const LS = { products:"cctv:products", quotes:"cctv:quotes", clients:"cctv:clients", company:"cctv:company", users:"cctv:users" };

function lsLoad(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function lsSave(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// Generic Firestore helpers
async function fsGet(col) {
  if (!db) return null;
  try {
    const snap = await db.collection(col).get();
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) { console.warn("fsGet error", e); return null; }
}
async function fsSet(col, id, data) {
  if (!db) return;
  try { await db.collection(col).doc(id).set(data, { merge: true }); } catch(e) { console.warn("fsSet error", e); }
}
async function fsDel(col, id) {
  if (!db) return;
  try { 
    await db.collection(col).doc(id).delete(); 
    console.log(`✓ Documento eliminado: ${col}/${id}`);
  } catch(e) { 
    console.error("fsDel error", e); 
    throw e;
  }
}
async function fsGetDoc(col, id) {
  if (!db) return null;
  try { const d = await db.collection(col).doc(id).get(); return d.exists ? { id: d.id, ...d.data() } : null; } catch { return null; }
}

// ═══════════════════════════════════════════════════════════════════════════════
// SECCIÓN 2 — CONSTANTES Y HELPERS
// ═══════════════════════════════════════════════════════════════════════════════

// ── Lógica de precios por rol ─────────────────────────────────────────────────
// price       = precio instalador (tu costo)
// pricePublic = precio sugerido al público
// Admin ve ambos. Instalador/Visitante ven precio público + incremento si aplica.
const GUEST_MARKUP_PCT = 5;

function getPriceForRole(product, user) {
  // Si el producto tiene pricePublic úsalo, si no usa price como fallback
  const hasDualPrice = product.pricePublic && product.pricePublic !== product.price;
  const pub  = hasDualPrice ? product.pricePublic : product.price;
  const cost = product.price;

  if (user?.role === "admin") {
    // Admin: ve precio instalador (costo) Y precio público
    return { display: cost, publicPrice: pub, isAdmin: true, hasDualPrice };
  }
  if (user?.role === "installer") {
    // Instalador: precio público con su descuento aplicado
    const disc = user.discount || 0;
    const markup = user.markup || 0;
    let final = pub;
    if (markup > 0) final = final * (1 + markup / 100);
    if (disc > 0)   final = final * (1 - disc / 100);
    return { display: final, publicPrice: pub, discountPct: disc, markupPct: markup };
  }
  // Visitante: precio público + 5% markup
  return { display: pub * (1 + GUEST_MARKUP_PCT / 100), publicPrice: pub, markupPct: GUEST_MARKUP_PCT };
}

// SECCIÓN 3 — CONTEXTO DE AUTENTICACIÓN
// ═══════════════════════════════════════════════════════════════════════════════

const AuthCtx = createContext(null);
const useAuth = () => useContext(AuthCtx);

function AuthProvider({ children }) {
  const [user, setUser] = useState(null);       // { id, email, name, role, discount }
  const [authReady, setAuthReady] = useState(false);

  useEffect(() => {
    // Restaurar sesión local
    const saved = lsLoad("cctv:session", null);
    if (saved) setUser(saved);
    setAuthReady(true);
  }, []);

  const login = async (email, password) => {
    // Modo Firebase Auth
    if (window.USE_FIREBASE && fbAuth) {
      try {
        const cred = await fbAuth.signInWithEmailAndPassword(email, password);
        const profile = await fsGetDoc("users", cred.user.uid);
        if (!profile) throw new Error("Usuario no encontrado en base de datos");
        if (!profile.active) throw new Error("Usuario desactivado");
        const u = { id: cred.user.uid, email: cred.user.email, name: profile.name, role: profile.role, discount: profile.discount || 0 };
        setUser(u); lsSave("cctv:session", u);
        return { ok: true };
      } catch(e) { return { ok: false, error: e.message }; }
    }
    // Modo localStorage
    const users = lsLoad(LS.users, DEF_USERS);
    const found = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);
    if (!found) return { ok: false, error: "Email o contraseña incorrectos" };
    if (!found.active) return { ok: false, error: "Usuario desactivado" };
    const u = { id: found.id, email: found.email, name: found.name, role: found.role, discount: found.discount || 0 };
    setUser(u); lsSave("cctv:session", u);
    return { ok: true };
  };

  const logout = () => {
    if (window.USE_FIREBASE && fbAuth) fbAuth.signOut().catch(()=>{});
    setUser(null); localStorage.removeItem("cctv:session");
  };

  return <AuthCtx.Provider value={{ user, authReady, login, logout }}>{children}</AuthCtx.Provider>;
}

// SECCIÓN 4 — HOOK DE DATOS (productos, cotizaciones, clientes, empresa, usuarios)
// ═══════════════════════════════════════════════════════════════════════════════

function useData() {
  const [products, setProductsRaw] = useState([]);
  const [quotes, setQuotesRaw] = useState([]);
  const [clients, setClientsRaw] = useState([]);
  const [company, setCompanyRaw] = useState(DEF_COMPANY);
  const [users, setUsersRaw] = useState([]);
  const [loading, setLoading] = useState(true);

  // Load all data on mount with real-time listeners
  useEffect(() => {
    if (window.USE_FIREBASE && db) {
      // Real-time listener para productos
      const unsubProducts = db.collection("products").onSnapshot(snap => {
        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        setProductsRaw(data.length ? data : DEF_PRODUCTS);
        setLoading(false);
      }, err => {
        console.warn("Products listener error:", err);
        setProductsRaw(DEF_PRODUCTS);
        setLoading(false);
      });

      // Real-time listener para cotizaciones
      const unsubQuotes = db.collection("quotes").onSnapshot(snap => {
        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        setQuotesRaw(data);
      }, err => console.warn("Quotes listener error:", err));

      // Real-time listener para clientes
      const unsubClients = db.collection("clients").onSnapshot(snap => {
        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        setClientsRaw(data);
      }, err => console.warn("Clients listener error:", err));

      // Real-time listener para usuarios
      const unsubUsers = db.collection("users").onSnapshot(snap => {
        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        setUsersRaw(data.length ? data : DEF_USERS);
      }, err => console.warn("Users listener error:", err));

      // Real-time listener para configuración de empresa
      const unsubCompany = db.collection("config").doc("company").onSnapshot(doc => {
        setCompanyRaw(doc.exists ? { id: doc.id, ...doc.data() } : DEF_COMPANY);
      }, err => console.warn("Company listener error:", err));

      // Cleanup: desuscribir listeners cuando el componente se desmonte
      return () => {
        unsubProducts();
        unsubQuotes();
        unsubClients();
        unsubUsers();
        unsubCompany();
      };
    } else {
      // Modo localStorage (sin Firebase)
      const rawProds = lsLoad(LS.products, DEF_PRODUCTS);
      setProductsRaw(rawProds);
      setQuotesRaw(lsLoad(LS.quotes, []));
      setClientsRaw(lsLoad(LS.clients, []));
      setCompanyRaw(lsLoad(LS.company, DEF_COMPANY));
      setUsersRaw(lsLoad(LS.users, DEF_USERS));
      setLoading(false);
    }
  }, []);

  // Persist helpers
  const setProducts = useCallback(async (val) => {
    const list = typeof val === "function" ? val(products) : val;
    console.log("💾 setProducts llamado con", list.length, "productos");
    console.log("💾 USE_FIREBASE:", window.USE_FIREBASE);
    console.log("💾 db existe:", !!db);
    
    if (window.USE_FIREBASE && db) {
      // Con listeners en tiempo real, solo guardamos en Firebase
      // El listener actualizará automáticamente el estado
      console.log("💾 Guardando en Firebase...");
      try {
        await Promise.all(list.map(p => {
          console.log("💾 Guardando producto:", p.id, p.name);
          return fsSet("products", p.id, p);
        }));
        console.log("✅ Todos los productos guardados en Firebase");
      } catch(e) {
        console.error("❌ Error guardando en Firebase:", e);
        throw e;
      }
    } else { 
      console.log("💾 Guardando en localStorage...");
      setProductsRaw(list);
      lsSave(LS.products, list); 
      console.log("✅ Productos guardados en localStorage");
    }
  }, [products]);

  const deleteProduct = useCallback(async (id) => {
    if (window.USE_FIREBASE && db) { 
      // Con listeners en tiempo real, solo eliminamos de Firebase
      // El listener actualizará automáticamente el estado
      await fsDel("products", id); 
    } else { 
      const list = products.filter(p => p.id !== id);
      setProductsRaw(list);
      lsSave(LS.products, list); 
    }
  }, [products]);

  const setQuotes = useCallback(async (val) => {
    const list = typeof val === "function" ? val(quotes) : val;
    if (window.USE_FIREBASE && db) {
      await Promise.all(list.map(q => fsSet("quotes", q.id, q)));
    } else { 
      setQuotesRaw(list);
      lsSave(LS.quotes, list); 
    }
  }, [quotes]);

  const deleteQuote = useCallback(async (id) => {
    if (window.USE_FIREBASE && db) { 
      await fsDel("quotes", id); 
    } else { 
      const list = quotes.filter(q => q.id !== id);
      setQuotesRaw(list);
      lsSave(LS.quotes, list); 
    }
  }, [quotes]);

  const setClients = useCallback(async (val) => {
    const list = typeof val === "function" ? val(clients) : val;
    if (window.USE_FIREBASE && db) {
      await Promise.all(list.map(c => fsSet("clients", c.id, c)));
    } else { 
      setClientsRaw(list);
      lsSave(LS.clients, list); 
    }
  }, [clients]);

  const deleteClient = useCallback(async (id) => {
    if (window.USE_FIREBASE && db) { 
      await fsDel("clients", id); 
    } else { 
      const list = clients.filter(c => c.id !== id);
      setClientsRaw(list);
      lsSave(LS.clients, list); 
    }
  }, [clients]);

  const setCompany = useCallback(async (val) => {
    if (window.USE_FIREBASE && db) { 
      await fsSet("config", "company", val); 
    } else { 
      setCompanyRaw(val);
      lsSave(LS.company, val); 
    }
  }, []);

  const setUsers = useCallback(async (val) => {
    const list = typeof val === "function" ? val(users) : val;
    if (window.USE_FIREBASE && db) {
      await Promise.all(list.map(u => fsSet("users", u.id, u)));
    } else { 
      setUsersRaw(list);
      lsSave(LS.users, list); 
    }
  }, [users]);

  const deleteUser = useCallback(async (id) => {
    if (window.USE_FIREBASE && db) { 
      await fsDel("users", id); 
    } else { 
      const list = users.filter(u => u.id !== id);
      setUsersRaw(list);
      lsSave(LS.users, list); 
    }
  }, [users]);

  return {
    products, setProducts, deleteProduct,
    quotes, setQuotes, deleteQuote,
    clients, setClients, deleteClient,
    company, setCompany,
    users, setUsers, deleteUser,
    loading
  };
}

const Modal = ({onClose, children, wide, xl}) => (
  <div className="ov" onClick={e => e.target === e.currentTarget && onClose()}>
    <div className={`modal${xl?" modal-xl":wide?" modal-lg":""}`}>{children}</div>

function Toast({msg, type="ok", onDone}) {
  useEffect(() => { const t = setTimeout(onDone, 3500); return () => clearTimeout(t); }, []);
  return <div className={`toast toast-${type}`}>{msg}</div>;
}

function useToast() {
  const [toast, setToast] = useState(null);
  const show = (msg, type="ok") => setToast({msg, type, key: Date.now()});
  const el = toast ? <Toast key={toast.key} msg={toast.msg} type={toast.type} onDone={() => setToast(null)}/> : null;
  return [el, show];
}

function ImgUpload({value, onChange}) {
  const ref = useRef();
  const handle = async e => { const f = e.target.files[0]; if(f) onChange(await readFileAsDataURL(f)); };
  return (
    <div>
      <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={handle}/>
      {value ? (
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <img src={value} className="img-th" style={{width:58,height:58}}/>
          <div>
            <button className="btn bg bsm" style={{display:"block",marginBottom:6}} onClick={()=>ref.current.click()}><Ic d={I.img} s={13}/>Cambiar</button>
            <button className="btn bd bsm" onClick={()=>onChange(null)}><Ic d={I.x} s={13}/>Quitar</button>
          </div>
        </div>
      ) : (
        <div className="img-upload" onClick={()=>ref.current.click()}>
          <Ic d={I.img} s={20}/><span style={{fontSize:12,color:"var(--txt2)"}}>Click para agregar imagen (opcional)</span>
        </div>
      )}
    </div>
  );
}

function parseWorkbook(wb) {
  const out=[]; const seen=new Set();
  let sheets=wb.SheetNames;
  const fullIdx=sheets.find(n=>{const ws=wb.Sheets[n];const rows=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false});return rows[0]&&rows[0].some(h=>(h||"").toString().toLowerCase().includes("categoría principal")||(h||"").toString().toLowerCase().includes("categoria principal"));});
  if(fullIdx) sheets=[fullIdx];
  
  // Extraer imágenes del workbook si existen
  const imageMap = new Map();
  try {
    for(const sn of sheets){
      const ws=wb.Sheets[sn];
      // Intentar extraer imágenes embebidas (si SheetJS las soporta)
      if(ws['!images']) {
        ws['!images'].forEach((img, idx) => {
          if(img.data) {
            const base64 = btoa(String.fromCharCode(...new Uint8Array(img.data)));
            const ext = img.type || 'png';
            imageMap.set(`${sn}_${idx}`, `data:image/${ext};base64,${base64}`);
          }
        });
      }
    }
  } catch(e) { console.warn("No se pudieron extraer imágenes:", e); }
  
  for(const sn of sheets){
    const ws=wb.Sheets[sn];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false});
    if(rows.length<2) continue;
    const headers=rows[0].map(h=>(h||"").toString());
    const ci={
      name:findCol(headers,"nombre","producto","descripción","descripcion"),
      cat:findCol(headers,"categoría principal","categoria principal","categoría","categoria"),
      sub:findCol(headers,"subcategoría","subcategoria"),
      brand:findCol(headers,"marca","brand","fabricante"),
      model:findCol(headers,"modelo","sku","código","codigo","ref"),
      price:findCol(headers,"precio (cop)","precio cop","precio","price"),
      unit:findCol(headers,"unidad","unit"),
      image:findCol(headers,"imagen","image","foto","picture","img"),
    };
    if(ci.name<0||ci.price<0) continue;
    for(let r=1;r<rows.length;r++){
      const row=rows[r]; if(!row||!row.length) continue;
      const name=(row[ci.name]||"").toString().trim();
      const priceRaw=row[ci.price];
      if(!name) continue;
      const price=typeof priceRaw==="number"?priceRaw:parseFloat((priceRaw||"").toString().replace(/[^\d.,-]/g,"").replace(/\.(?=\d{3}(\D|$))/g,"").replace(",","."))||0;
      const catSrc=ci.cat>=0?row[ci.cat]:sn;
      const category=normCat(catSrc);
      const brand=ci.brand>=0?(row[ci.brand]||"").toString().trim():"";
      const sub=ci.sub>=0?(row[ci.sub]||"").toString().trim():"";
      const modelExplicit=ci.model>=0?(row[ci.model]||"").toString().trim():"";
      const model=modelExplicit||[brand,sub].filter(Boolean).join(" · ");
      const unit=(ci.unit>=0&&row[ci.unit])?row[ci.unit].toString().trim():"pza";
      const resolution=extractRes(name);
      const cameraType=category==="Cámaras"?extractCamType(sub,name):"";
      
      // Intentar obtener imagen de la columna o del mapa de imágenes
      let image = null;
      if(ci.image>=0 && row[ci.image]) {
        const imgVal = row[ci.image].toString().trim();
        // Si es una URL, usarla directamente
        if(imgVal.startsWith('http') || imgVal.startsWith('data:')) {
          image = imgVal;
        }
      }
      // Si no hay imagen en columna, intentar del mapa (primera imagen disponible para esta fila)
      if(!image && imageMap.size > 0) {
        const imgKey = `${sn}_${r-1}`;
        if(imageMap.has(imgKey)) {
          image = imageMap.get(imgKey);
        }
      }
      
      const key=name.toLowerCase();
      if(seen.has(key)) continue;
      seen.add(key);
      out.push({name,model,brand,subcategory:sub,resolution,cameraType,category,unit,price,image});
    }
  }
  return out;
}

function ImportExcelModal({existing, onConfirm, onClose}) {
  const [parsed,setParsed]=useState(null);
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const ref=useRef();
  const handle=async e=>{
    const f=e.target.files[0]; if(!f) return;
    setBusy(true); setErr("");
    try{
      const buf=await f.arrayBuffer();
      const wb=XLSX.read(buf,{type:"array"});
      const items=parseWorkbook(wb);
      if(items.length===0){setErr("No se encontraron filas válidas. Revisa que el Excel tenga columnas Nombre y Precio.");setBusy(false);return;}
      const exMap=new Map(existing.map(p=>[p.name.trim().toLowerCase(),p]));
      const toAdd=[],toUpdate=[];
      for(const it of items){
        const k=it.name.toLowerCase();
        if(exMap.has(k)) toUpdate.push({...exMap.get(k),...it,id:exMap.get(k).id,image:exMap.get(k).image||it.image});
        else toAdd.push(it);
      }
      setParsed({items,toAdd,toUpdate});
    }catch(ex){setErr("Error al leer el archivo: "+ex.message);}
    setBusy(false);
  };
  const doConfirm=()=>{
    const exMap=new Map(existing.map(p=>[p.name.trim().toLowerCase(),p]));
    const updated=existing.map(p=>{const m=parsed.toUpdate.find(u=>u.id===p.id);return m?m:p;});
    const added=parsed.toAdd.map(it=>({id:uid(),...it}));
    onConfirm([...updated,...added],{added:added.length,updated:parsed.toUpdate.length});
  };
  return (
    <Modal onClose={onClose} wide={true}>
      <div className="mt2">Importar Catálogo desde Excel</div>
      <div style={{fontSize:12,color:"var(--txt2)",marginBottom:14,lineHeight:1.6}}>
        Sube un archivo <b>.xlsx</b> con columnas: <code style={{color:"var(--acc)"}}>Nombre del Producto</code>, <code style={{color:"var(--acc)"}}>Categoría Principal</code>, <code style={{color:"var(--acc)"}}>Precio</code>.<br/>
        <b>Opcional:</b> Agrega una columna <code style={{color:"var(--acc)"}}>Imagen</code> con URLs de imágenes (http:// o https://) o imágenes embebidas en el Excel.<br/>
        Los productos con el mismo nombre se <b style={{color:"var(--ylw)"}}>actualizan</b>. Los nuevos se <b style={{color:"var(--grn)"}}>agregan</b>.
      </div>
      <input ref={ref} type="file" accept=".xlsx,.xls,.xlsm" style={{display:"none"}} onChange={handle}/>
      {!parsed&&(
        <div className="logo-zone" onClick={()=>!busy&&ref.current.click()} style={{padding:"30px 20px"}}>
          <Ic d={I.upload} s={32}/><div style={{fontSize:13,color:"var(--txt)",marginTop:10,fontWeight:600}}>{busy?"Procesando...":"Click para seleccionar archivo Excel"}</div>
          <div style={{fontSize:11,color:"var(--txt3)",marginTop:4}}>.xlsx, .xls, .xlsm</div>
        </div>
      )}
      {err&&<div style={{padding:"10px 14px",background:"var(--red-dim)",color:"var(--red)",borderRadius:"var(--r)",fontSize:12,marginTop:10}}>{err}</div>}
      {parsed&&(
        <>
          <div className="sg" style={{gridTemplateColumns:"1fr 1fr 1fr",marginBottom:14}}>
            <div className="sc bl"><div className="sl">Detectados</div><div className="sv">{parsed.items.length}</div><div className="ss">filas válidas</div></div>
            <div className="sc gr"><div className="sl">Nuevos</div><div className="sv">{parsed.toAdd.length}</div><div className="ss">se agregarán</div></div>
            <div className="sc yl"><div className="sl">Existentes</div><div className="sv">{parsed.toUpdate.length}</div><div className="ss">se actualizarán</div></div>
          </div>
          <div className="twrap" style={{maxHeight:260,overflowY:"auto",border:"1px solid var(--b1)",borderRadius:"var(--r)"}}>
            <table>
              <thead style={{position:"sticky",top:0,background:"var(--bg2)"}}>
                <tr><th>Acción</th><th>Producto</th><th>Categoría</th><th style={{textAlign:"right"}}>Precio</th></tr>
              </thead>
              <tbody>
                {parsed.toAdd.slice(0,60).map((it,i)=>(
                  <tr key={"a"+i}><td><span className="badge bst" style={{fontSize:10}}>NUEVO</span></td>
                  <td><div className="fw6">{it.name}</div>{it.model&&<div className="txs t3">{it.model}</div>}</td>
                  <td><CatBadge cat={it.category}/></td>
                  <td className="fm fw6 tc" style={{textAlign:"right"}}>{fmt(it.price)}</td></tr>
                ))}
                {parsed.toUpdate.slice(0,60).map((it,i)=>(
                  <tr key={"u"+i}><td><span className="badge bg2b" style={{fontSize:10}}>ACTUALIZA</span></td>
                  <td><div className="fw6">{it.name}</div>{it.model&&<div className="txs t3">{it.model}</div>}</td>
                  <td><CatBadge cat={it.category}/></td>
                  <td className="fm fw6 tc" style={{textAlign:"right"}}>{fmt(it.price)}</td></tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}
      <div className="mf">
        <button className="btn bg" onClick={onClose}>Cancelar</button>
        {parsed&&<button className="btn bg" onClick={()=>{setParsed(null);setErr("");}}>Otro archivo</button>}
        {parsed&&<button className="btn bp" onClick={doConfirm}><Ic d={I.check} s={14}/>Confirmar e importar</button>}
      </div>
    </Modal>
  );
}

        ${(quote.shipping||0)>0?`<div class="sum-row"><span class="sum-label">Envío/Flete</span><span class="sum-value">${fn(quote.shipping)}</span></div>`:""}
        <div class="sum-row"><span class="sum-label">IVA (${quote.tax}%)</span><span class="sum-value">${fn(taxAmt)}</span></div>

}

function exportPDF(quote, company) {
  const docType = quote.docType || "quote";
  const docLabel = docType === "invoice" ? "Factura" : "Cotización";
  const qid = quote.id.slice(-6).toUpperCase();
  const docNumber = docType === "invoice" && quote.invoiceNumber ? quote.invoiceNumber : qid;
  const fileName = `${docLabel}_${docNumber}_${quote.clientName.replace(/[^a-zA-Z0-9]/g, '_')}.pdf`;
  
  // Mostrar indicador de carga
  const loadingDiv = document.createElement('div');
  loadingDiv.id = '__pdfloading';
  loadingDiv.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;';
  loadingDiv.innerHTML = `
    <div style="width:50px;height:50px;border:4px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
    <div style="color:#fff;font-size:16px;font-weight:600;font-family:sans-serif;">Generando PDF...</div>
    <style>@keyframes spin{to{transform:rotate(360deg);}}</style>`;
  document.body.appendChild(loadingDiv);
  
  setTimeout(async () => {
    try {
      console.log('Iniciando generación de PDF...');
      
      // Verificar que jsPDF y html2canvas estén disponibles
      if (!window.jspdf) {
        throw new Error('jsPDF no está cargado');
      }
      if (!window.html2canvas) {
        throw new Error('html2canvas no está cargado');
      }
      
      const html = buildPDFHtml(quote, company);
      
      // Crear contenedor temporal
      const container = document.createElement('div');
      container.style.cssText = 'position:absolute;left:-9999px;top:0;width:794px;background:#fff;';
      container.innerHTML = html;
      document.body.appendChild(container);
      
      console.log('Contenedor creado, esperando imágenes...');
      
      // Esperar a que las imágenes se carguen
      const images = container.querySelectorAll('img');
      await Promise.all(Array.from(images).map(img => {
        if (img.complete) return Promise.resolve();
        return new Promise(resolve => {
          img.onload = resolve;
          img.onerror = resolve;
          setTimeout(resolve, 2000); // timeout de seguridad
        });
      }));
      
      console.log('Imágenes cargadas, capturando canvas...');
      
      // Capturar el contenido como canvas
      const canvas = await html2canvas(container.querySelector('.wrap'), {
        scale: 2,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#ffffff',
        logging: false
      });
      
      console.log('Canvas capturado, creando PDF...');
      
      // Crear PDF
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({
        orientation: 'portrait',
        unit: 'mm',
        format: 'a4'
      });
      
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const pdfWidth = pdf.internal.pageSize.getWidth();
      const pdfHeight = pdf.internal.pageSize.getHeight();
      const imgWidth = pdfWidth;
      const imgHeight = (canvas.height * pdfWidth) / canvas.width;
      
      let heightLeft = imgHeight;
      let position = 0;
      
      // Agregar primera página
      pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
      heightLeft -= pdfHeight;
      
      // Agregar páginas adicionales si es necesario
      while (heightLeft > 0) {
        position = heightLeft - imgHeight;
        pdf.addPage();
        pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
        heightLeft -= pdfHeight;
      }
      
      console.log('PDF creado, descargando...');
      
      // Descargar PDF
      pdf.save(fileName);
      
      console.log('PDF descargado exitosamente');
      
      // Limpiar
      container.remove();
      loadingDiv.remove();
      
    } catch (error) {
      console.error('Error generando PDF:', error);
      const loading = document.getElementById('__pdfloading');
      if (loading) loading.remove();
      alert('Error al generar el PDF: ' + error.message + '\n\nPor favor verifica la consola del navegador para más detalles.');
    }
  }, 100);
}

// SECCIÓN 9 — ENVÍO DE EMAIL (EmailJS)
// ═══════════════════════════════════════════════════════════════════════════════

async function sendQuoteEmail(quote, company) {
  const cfg = window.EMAILJS_CONFIG;
  if (!cfg || cfg.publicKey === "TU_EMAILJS_PUBLIC_KEY") {
    console.warn("EmailJS no configurado");
    return { ok: false, error: "EmailJS no configurado" };
  }
  try {
    emailjs.init(cfg.publicKey);
    const sub = quote.items.reduce((s,i) => s + i.qty * i.unitPrice, 0);
    const discountAmt = quote.discountPct > 0 ? sub * (quote.discountPct / 100) : (quote.discount || 0);
    const taxAmt = (sub - discountAmt) * (quote.tax / 100);
    const total = sub - discountAmt + taxAmt + (quote.shipping || 0);
    const itemsList = quote.items.map(it => `• ${it.name} x${it.qty} = $${(it.qty*it.unitPrice).toLocaleString("es-MX")}`).join("\n");
    await emailjs.send(cfg.serviceId, cfg.templateId, {
      to_email: cfg.adminEmail,
      quote_id: quote.id.slice(-6).toUpperCase(),
      client_name: quote.clientName,
      client_email: quote.clientEmail || "—",
      client_phone: quote.clientPhone || "—",
      items_list: itemsList,
      subtotal: `$${sub.toLocaleString("es-MX",{minimumFractionDigits:2})}`,
      discount: discountAmt > 0 ? `-$${discountAmt.toLocaleString("es-MX",{minimumFractionDigits:2})}` : "—",
      tax: `$${taxAmt.toLocaleString("es-MX",{minimumFractionDigits:2})} (${quote.tax}%)`,
      total: `$${total.toLocaleString("es-MX",{minimumFractionDigits:2})}`,
      quote_date: quote.date,
      company_name: company.name,
    });
    return { ok: true };
  } catch(e) {
    console.error("EmailJS error:", e);
    return { ok: false, error: e.text || e.message || "Error al enviar" };
  }
}

const DEF_FILTERS = {srch:"",cat:"Todos",subcat:"Todas",brand:"Todas",camType:"Todos",res:"Todas",sort:"none"};

function applyFilters(products, f) {
  const s = (f.srch||"").toLowerCase();
  let out = products.filter(p => {
    if(s && !(p.name.toLowerCase().includes(s)||(p.model||"").toLowerCase().includes(s)||(p.brand||"").toLowerCase().includes(s))) return false;
    if(f.cat!=="Todos" && p.category!==f.cat) return false;
    if(f.subcat!=="Todas" && (p.subcategory||"")!==f.subcat) return false;
    if(f.brand!=="Todas" && (p.brand||"")!==f.brand) return false;
    if(f.camType!=="Todos" && (p.cameraType||"")!==f.camType) return false;
    if(f.res!=="Todas" && (p.resolution||"")!==f.res) return false;
    return true;
  });
  if(f.sort==="price-desc") out=[...out].sort((a,b)=>(b.price||0)-(a.price||0));
  else if(f.sort==="price-asc") out=[...out].sort((a,b)=>(a.price||0)-(b.price||0));
  else if(f.sort==="name-asc") out=[...out].sort((a,b)=>a.name.localeCompare(b.name));
  return out;
}

// SECCIÓN 12 — CARRITO (contexto compartido)

const CartCtx = createContext(null);
const useCart = () => useContext(CartCtx);

function CartProvider({children}) {
  const [items, setItems] = useState([]);
  const [open, setOpen] = useState(false);

  const add = (product, qty=1) => {
    setItems(prev => {
      const ex = prev.find(i => i.productId === product.id);
      if(ex) return prev.map(i => i.productId===product.id ? {...i, qty: i.qty+qty} : i);
      return [...prev, {productId:product.id, name:product.name, model:product.model, unit:product.unit, unitPrice:product.price, qty, image:product.image||null}];
    });
  };
  const remove = id => setItems(prev => prev.filter(i => i.productId !== id));
  const updateQty = (id, qty) => { if(qty<1) return; setItems(prev => prev.map(i => i.productId===id ? {...i,qty} : i)); };
  const updatePrice = (id, price) => setItems(prev => prev.map(i => i.productId===id ? {...i,unitPrice:parseFloat(price)||0} : i));
  const clear = () => setItems([]);
  const count = items.reduce((s,i) => s+i.qty, 0);
  const subtotal = items.reduce((s,i) => s+i.qty*i.unitPrice, 0);

  return (
    <CartCtx.Provider value={{items, add, remove, updateQty, updatePrice, clear, count, subtotal, open, setOpen}}>
      {children}
    </CartCtx.Provider>
  );
}

      <div className="ph">
        <div>
          <div className="pt">Catálogo de <span>Productos</span></div>
          <div className="ps">{products.length} productos disponibles{user?.role==="installer"&&user.discount>0&&<span style={{color:"var(--grn)",marginLeft:8,fontWeight:600}}>· {user.discount}% descuento aplicado</span>}</div>
        </div>
      </div>
      
      {/* Botón flotante del carrito */}
      <button className="floating-cart-btn" onClick={()=>setOpen(true)} title="Ver Carrito">
        🛒
        {count>0&&<span className="floating-cart-badge">{count}</span>}
      </button>

      {!selectedCat ? (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14}}>
          {buckets.length===0 ? (
            <div className="card empty" style={{gridColumn:"1/-1"}}><p>Sin productos en el catálogo</p></div>
          ) : buckets.map(b => {
            const minP = Math.min(...b.items.map(x=>x.price||0));
            const maxP = Math.max(...b.items.map(x=>x.price||0));
            const brs = uniqVals(b.items,"brand");
            return (
              <div key={b.cat} onClick={()=>{setSelectedCat(b.cat);setFilters({...DEF_FILTERS});}}
                style={{background:"var(--bg2)",border:"1px solid var(--b1)",borderRadius:"var(--r2)",padding:"18px 20px",cursor:"pointer",transition:"all .15s",position:"relative",overflow:"hidden"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--acc)";e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="var(--acc-glow)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--b1)";e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="";}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <CatBadge cat={b.cat}/>
                  <Ic d={I.arrow} s={16}/>
                </div>
                <div style={{fontFamily:"var(--fh)",fontSize:18,fontWeight:800,marginBottom:4}}>{b.cat}</div>
                <div style={{fontSize:12,color:"var(--txt2)",marginBottom:11}}>{b.items.length} productos{brs.length>0?` · ${brs.length} marca(s)`:""}</div>
                <div style={{fontSize:11,color:"var(--txt3)",fontFamily:"var(--fm)"}}>
                  Desde <span className="tc fw7">{fmt(minP)}</span> hasta <span className="tc fw7">{fmt(maxP)}</span>
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        (() => {
          const inCat = products.filter(p=>p.category===selectedCat);
          const filtered = applyFilters(inCat, {...filters, cat:"Todos"});
          return (
            <>
              <div className="ph" style={{marginBottom:14}}>
                <div style={{display:"flex",alignItems:"center",gap:14}}>
                  <button className="btn bg bsm" onClick={()=>setSelectedCat(null)}><Ic d={I.back} s={13}/>Categorías</button>
                  <div>
                    <div className="pt">{selectedCat}</div>
                    <div className="ps">{filtered.length} de {inCat.length} productos</div>
                  </div>
                </div>
              </div>
              <div className="card" style={{marginBottom:14}}>
                <CategoryFiltersBar products={inCat} filters={filters} setF={setFilters}/>
              </div>
              {filtered.length===0 ? (
                <div className="card empty"><p>Sin productos que coincidan</p></div>
              ) : (
                <div className="cat-grid">
                  {filtered.map(p => {
                    const pr = getPriceForRole(p, user);
                    return (
                      <div key={p.id} className="prod-card">
                        <div className="prod-card-img">
                          {p.image ? <img src={p.image} style={{maxHeight:110,maxWidth:"100%",objectFit:"contain"}}/> : <Ic d={I.cam} s={40} stroke="var(--b2)"/>}
                        </div>
                        <div className="prod-card-body">
                          <CatBadge cat={p.category}/>
                          {/* Nombre corto: modelo + marca */}
                          <div className="prod-card-name" style={{marginTop:6}}>{p.model||p.name}{p.brand&&<span style={{fontWeight:400,color:"var(--txt3)"}}> · {p.brand}</span>}</div>
                          {/* Descripción larga debajo */}
                          {p.description&&<div style={{fontSize:10,color:"var(--txt3)",lineHeight:1.4,marginBottom:6,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{p.description}</div>}
                          {!p.description&&p.name!==p.model&&<div className="prod-card-model">{p.name}</div>}
                          {/* Precios */}
                          {pr.isAdmin ? (
                            <div style={{marginBottom:4}}>
                              <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                                <div className="prod-card-price">{fmt(pr.display)}</div>
                                <span style={{fontSize:10,color:"var(--txt3)",fontFamily:"var(--fm)"}}>instalador</span>
                              </div>
                              {pr.hasDualPrice && (
                                <div style={{display:"flex",alignItems:"baseline",gap:6,marginTop:2}}>
                                  <div style={{fontSize:13,fontWeight:700,color:"var(--grn)",fontFamily:"var(--fh)"}}>{fmt(pr.publicPrice)}</div>
                                  <span style={{fontSize:10,color:"var(--txt3)",fontFamily:"var(--fm)"}}>público</span>
                                </div>
                              )}
                            </div>
                          ) : (
                            <div style={{marginBottom:4}}>
                              <div className="prod-card-price">{fmt(pr.display)}</div>
                            </div>
                          )}
                          <button className="btn bp cart-btn bsm" onClick={()=>handleAdd(p)}>
                            <Ic d={I.cart} s={13}/>Agregar al carrito
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          );
        })()
      )}
    </div>
  );
}

// SECCIÓN 14 — DASHBOARD (admin)
// ═══════════════════════════════════════════════════════════════════════════════

function Dashboard({products, quotes, clients, setView}) {
  const sent = quotes.filter(q=>q.status==="sent");
  const rev = sent.reduce((s,q)=>{
    const sub=q.items.reduce((a,i)=>a+i.qty*i.unitPrice,0);
    const disc=q.discountPct>0?sub*(q.discountPct/100):(q.discount||0);
    return s+(sub-disc)*(1+q.tax/100)+(q.shipping||0);
  },0);
  const recent = [...quotes].sort((a,b)=>b._ts-a._ts).slice(0,6);
  return (
    <div className="page">
      <div className="ph"><div><div className="pt">Panel <span>Principal</span></div><div className="ps">Vista general de tu negocio</div></div></div>
      <div className="sg">
        <div className="sc bl"><div className="sl">Cotizaciones</div><div className="sv">{quotes.length}</div><div className="ss">totales</div></div>
        <div className="sc gr"><div className="sl">Enviadas</div><div className="sv">{sent.length}</div><div className="ss">al cliente</div></div>
        <div className="sc yl"><div className="sl">Facturación est.</div><div className="sv" style={{fontSize:17}}>{fmt(rev)}</div><div className="ss">cots. enviadas</div></div>
        <div className="sc rd"><div className="sl">Clientes</div><div className="sv">{clients.length}</div><div className="ss">registrados</div></div>
      </div>
      <div className="card">
        <div className="ch"><div className="ct">Cotizaciones recientes</div><button className="btn bg bsm" onClick={()=>setView("quotes")}>Ver todas</button></div>
        {recent.length===0?<div className="empty"><p>Sin cotizaciones aún</p></div>:
        <table><thead><tr><th>#</th><th>Cliente</th><th>Fecha</th><th>Estado</th><th>Origen</th><th style={{textAlign:"right"}}>Total</th></tr></thead>
        <tbody>{recent.map(q=>{
          const sub=q.items.reduce((s,i)=>s+i.qty*i.unitPrice,0);
          const disc=q.discountPct>0?sub*(q.discountPct/100):(q.discount||0);
          const total=(sub-disc)*(1+q.tax/100)+(q.shipping||0);
          return <tr key={q.id}>
            <td className="fm txs t3">#{q.id.slice(-6).toUpperCase()}</td>
            <td className="fw6">{q.clientName}</td>
            <td className="ts t2">{q.date}</td>
            <td><span style={{fontSize:11,color:q.status==="sent"?"var(--grn)":"var(--ylw)",fontFamily:"var(--fm)"}}>{q.status==="sent"?"● Enviada":"○ Borrador"}</span></td>
            <td><span className="badge bo" style={{fontSize:10}}>{q.createdByRole==="installer"?"Instalador":q.createdByRole==="guest"?"Visitante":"Admin"}</span></td>
            <td className="fm fw6 tc" style={{textAlign:"right"}}>{fmt(total)}</td>
          </tr>;
        })}</tbody></table>}
      </div>
    </div>
  );
}

function ProductModal({initial, onSave, onClose}) {
  // Si initial tiene id, es edición; si no, es creación
  const isEdit = initial && initial.id;
  const defaultCategory = initial?.category || "Cámaras";
  
  const [f,setF]=useState(initial||{name:"",model:"",brand:"",cameraType:"",resolution:"",category:defaultCategory,unit:"pza",price:"",image:null,subcategory:""});
  const s=(k,v)=>setF(x=>({...x,[k]:v}));
  
  const handleSave = () => {
    onSave({...f,price:parseFloat(f.price)||0});

  return (
    <Modal onClose={onClose}>
      <div className="mt2">{isEdit?"Editar Producto":"Nuevo Producto"}</div>

        <div className="fl"><label className="lb">Unidad</label>
          <select className="sel" value={f.unit} onChange={e=>s("unit",e.target.value)}>
            {["pza","rollo","mt","hr","kit","servicio","lote"].map(u=><option key={u}>{u}</option>)}

        <button className="btn bg" onClick={onClose}>Cancelar</button>

      </div>
    </Modal>
  );
}

// ─── JSON Import Modal ────────────────────────────────────────────────────────
function ImportJSONModal({existing, onConfirm, onClose}) {
  const [parsed,setParsed]=useState(null);
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const ref=useRef();

  const handle = async e => {
    const f = e.target.files[0]; if(!f) return;
    setBusy(true); setErr("");
    try {
      const text = await f.text();
      const items = JSON.parse(text);
      if(!Array.isArray(items)) throw new Error("El archivo no contiene un array de productos");
      if(items.length===0) throw new Error("El archivo está vacío");
      // Validate basic structure
      const valid = items.filter(it => it.name && (it.price >= 0 || it.pricePublic >= 0));
      if(valid.length===0) throw new Error("No se encontraron productos válidos (requieren 'name' y 'price')");
      const exMap = new Map(existing.map(p=>[p.model?.toLowerCase().trim()||p.name.toLowerCase().trim(), p]));
      const toAdd=[], toUpdate=[];
      for(const it of valid) {
        const k = (it.model||it.name).toLowerCase().trim();
        if(exMap.has(k)) toUpdate.push({...exMap.get(k), ...it, id:exMap.get(k).id});
        else toAdd.push(it);
      }
      setParsed({items:valid, toAdd, toUpdate});
    } catch(ex) { setErr("Error: "+ex.message); }
    setBusy(false);
  };

  const doConfirm = () => {
    const exMap = new Map(existing.map(p=>[(p.model||p.name).toLowerCase().trim(), p]));
    const updated = existing.map(p => {
      const k = (p.model||p.name).toLowerCase().trim();
      const m = parsed.toUpdate.find(u => (u.model||u.name).toLowerCase().trim()===k);
      return m ? {...p,...m,id:p.id} : p;
    });
    const added = parsed.toAdd.map(it=>({id:uid(),...it}));
    onConfirm([...updated,...added], {added:added.length, updated:parsed.toUpdate.length});
  };

  const withImg = parsed ? parsed.items.filter(p=>p.image).length : 0;
  const withDualPrice = parsed ? parsed.items.filter(p=>p.pricePublic && p.pricePublic !== p.price).length : 0;

  return (
    <Modal onClose={onClose} wide={true}>
      <div className="mt2">Importar Catálogo desde JSON</div>
      <div style={{fontSize:12,color:"var(--txt2)",marginBottom:14,lineHeight:1.7}}>
        Importa el archivo <code style={{color:"var(--acc)"}}>catalogo_hikvision.json</code> generado con el script Python.<br/>
        Incluye <b>productos con imágenes</b> extraídas directamente del Excel de Hikvision.
      </div>
      <input ref={ref} type="file" accept=".json" style={{display:"none"}} onChange={handle}/>
      {!parsed && (
        <div className="logo-zone" onClick={()=>!busy&&ref.current.click()} style={{padding:"30px 20px"}}>
          <Ic d={I.upload} s={32}/>
          <div style={{fontSize:13,color:"var(--txt)",marginTop:10,fontWeight:600}}>{busy?"Procesando...":"Click para seleccionar archivo JSON"}</div>
          <div style={{fontSize:11,color:"var(--txt3)",marginTop:4}}>catalogo_hikvision.json</div>
        </div>
      )}
      {err && <div style={{padding:"10px 14px",background:"var(--red-dim)",color:"var(--red)",borderRadius:"var(--r)",fontSize:12,marginTop:10}}>{err}</div>}
      {parsed && (
        <>
          <div className="sg" style={{gridTemplateColumns:"1fr 1fr 1fr 1fr",marginBottom:14}}>
            <div className="sc bl"><div className="sl">Total</div><div className="sv">{parsed.items.length}</div><div className="ss">productos</div></div>
            <div className="sc gr"><div className="sl">Nuevos</div><div className="sv">{parsed.toAdd.length}</div><div className="ss">se agregarán</div></div>
            <div className="sc yl"><div className="sl">Actualizan</div><div className="sv">{parsed.toUpdate.length}</div><div className="ss">existentes</div></div>
            <div className="sc pu"><div className="sl">2 precios</div><div className="sv">{withDualPrice}</div><div className="ss">con precio dual</div></div>
          </div>
          <div className="twrap" style={{maxHeight:260,overflowY:"auto",border:"1px solid var(--b1)",borderRadius:"var(--r)"}}>
            <table>
              <thead style={{position:"sticky",top:0,background:"var(--bg2)"}}>
                <tr><th>Img</th><th>Acción</th><th>Producto</th><th>Categoría</th><th style={{textAlign:"right"}}>P. Instalador</th><th style={{textAlign:"right"}}>P. Público</th></tr>
              </thead>
              <tbody>
                {[...parsed.toAdd.slice(0,40), ...parsed.toUpdate.slice(0,20)].map((it,i)=>(
                  <tr key={i}>
                    <td style={{width:40}}>
                      {it.image
                        ? <img src={it.image} style={{width:34,height:34,objectFit:"contain",borderRadius:4,border:"1px solid var(--b1)"}}/>
                        : <div style={{width:34,height:34,borderRadius:4,background:"var(--bg4)",border:"1px solid var(--b1)",display:"flex",alignItems:"center",justifyContent:"center",opacity:.4}}><Ic d={I.img} s={13}/></div>}
                    </td>
                    <td><span className={`badge ${i<parsed.toAdd.slice(0,40).length?"bst":"bg2b"}`} style={{fontSize:10}}>{i<parsed.toAdd.slice(0,40).length?"NUEVO":"ACTUALIZA"}</span></td>
                    <td><div className="fw6" style={{fontSize:12}}>{it.model||it.name?.slice(0,50)}</div><div className="txs t3">{it.brand}</div></td>
                    <td><CatBadge cat={it.category||"Otro"}/></td>
                    <td className="fm fw6 tc" style={{textAlign:"right"}}>{fmt(it.price)}</td>
                    <td className="fm fw6" style={{textAlign:"right",color:"var(--grn)"}}>{it.pricePublic?fmt(it.pricePublic):"—"}</td>
                  </tr>
                ))}
                {(parsed.toAdd.length+parsed.toUpdate.length)>60 && (
                  <tr><td colSpan="5" style={{textAlign:"center",color:"var(--txt3)",fontSize:11,padding:8}}>... y {parsed.toAdd.length+parsed.toUpdate.length-60} más (todos se importarán)</td></tr>
                )}
              </tbody>
            </table>
          </div>
        </>
      )}
      <div className="mf">
        <button className="btn bg" onClick={onClose}>Cancelar</button>
        {parsed && <button className="btn bg" onClick={()=>{setParsed(null);setErr("");}}>Otro archivo</button>}
        {parsed && <button className="btn bp" onClick={doConfirm}><Ic d={I.check} s={14}/>Confirmar e importar ({parsed.items.length})</button>}
      </div>
    </Modal>
  );
}

// ─── Inventory ────────────────────────────────────────────────────────────────
function Inventory({products, setProducts, deleteProduct}) {
  const [modal,setModal]=useState(null);
  const [impOpen,setImpOpen]=useState(false);
  const [jsonOpen,setJsonOpen]=useState(false);
  const [toastEl,showToast]=useToast();
  const [selectedCat,setSelectedCat]=useState(null);
  const [filters,setFilters]=useState({...DEF_FILTERS});
  const [selected,setSelected]=useState(new Set()); // IDs seleccionados para borrado múltiple
  const [confirmDeleteAll,setConfirmDeleteAll]=useState(false);

  const toggleSelect = id => setSelected(prev => {
    const n = new Set(prev);
    n.has(id) ? n.delete(id) : n.add(id);
    return n;
  });
  const toggleSelectAll = (ids) => setSelected(prev => {
    if(ids.every(id=>prev.has(id))) return new Set();
    return new Set(ids);
  });

  const doSave = async form => {
    console.log("🔵 doSave llamado con:", form);
    console.log("🔵 modal:", modal);
    console.log("🔵 productos actuales:", products.length);
    
    try {
      if(modal && modal.id) {
        // Editar producto existente
        console.log("✏️ Editando producto existente con id:", modal.id);
        const updatedProducts = products.map(p=>p.id===modal.id?{...p,...form}:p);
        console.log("✏️ Productos actualizados:", updatedProducts.length);
        await setProducts(updatedProducts);
      } else {
        // Crear nuevo producto
        console.log("➕ Creando nuevo producto");
        const np = {id:uid(),...form};
        console.log("➕ Nuevo producto:", np);
        const newProducts = [...products, np];
        console.log("➕ Total productos después de agregar:", newProducts.length);
        await setProducts(newProducts);
      }
      console.log("✅ Producto guardado exitosamente");
      setModal(null); // Cerrar modal después de guardar
      showToast("✓ Producto guardado");
    } catch(e) {
      console.error("❌ Error al guardar producto:", e);
      showToast("❌ Error al guardar producto", "error");
    }
  };

  const del = async id => {
    if(!confirm("¿Eliminar producto?")) return;
    try {
      await deleteProduct(id);
      setSelected(prev=>{const n=new Set(prev);n.delete(id);return n;});
      showToast("✓ Producto eliminado");
    } catch(e) {
      console.error("Error al eliminar:", e);
      showToast("❌ Error al eliminar producto", "error");
    }
  };

  const delSelected = async () => {
    if(!confirm(`¿Eliminar ${selected.size} producto(s) seleccionado(s)?`)) return;
    const remaining = products.filter(p=>!selected.has(p.id));
    await setProducts(remaining);
    setSelected(new Set());
    showToast(`✓ ${selected.size} productos eliminados`,"info");
  };

  const delAll = async () => {
    await setProducts([]);
    setSelected(new Set());
    setConfirmDeleteAll(false);
    showToast("✓ Todos los productos eliminados","info");
  };

  const doImport = async (newList, stats) => {
    await setProducts(newList);
    setImpOpen(false);
    showToast(`✓ ${stats.added} agregados, ${stats.updated} actualizados`);
  };

  const doImportJSON = async (newList, stats) => {
    await setProducts(newList);
    setJsonOpen(false);
    showToast(`✓ JSON importado: ${stats.added} nuevos, ${stats.updated} actualizados`);
  };

  const allCats = [...CATS,"Otro"];
  const buckets = allCats.map(c=>({cat:c,items:products.filter(p=>p.category===c)})).filter(b=>b.items.length>0);

  // Detectar si los productos tienen precios duales reales
  const hasDualPrices = products.some(p => p.pricePublic && p.pricePublic !== p.price);

  return (
    <div className="page">
      {toastEl}
      {modal&&<ProductModal initial={modal} onSave={doSave} onClose={()=>setModal(null)}/>}
      {impOpen&&<ImportExcelModal existing={products} onConfirm={doImport} onClose={()=>setImpOpen(false)}/>}
      {jsonOpen&&<ImportJSONModal existing={products} onConfirm={doImportJSON} onClose={()=>setJsonOpen(false)}/>}
      {confirmDeleteAll&&(
        <div className="ov">
          <div className="modal" style={{maxWidth:400}}>
            <div className="mt2" style={{color:"var(--red)"}}>⚠ Eliminar TODOS los productos</div>
            <p style={{fontSize:13,color:"var(--txt2)",marginBottom:18}}>Esta acción eliminará los <b>{products.length} productos</b> del catálogo. No se puede deshacer.</p>
            <div className="mf">
              <button className="btn bg" onClick={()=>setConfirmDeleteAll(false)}>Cancelar</button>
              <button className="btn bd" onClick={delAll}><Ic d={I.trash} s={14}/>Sí, eliminar todo</button>
            </div>
          </div>
        </div>
      )}

      {!hasDualPrices && products.length > 0 && (
        <div style={{padding:"11px 16px",background:"rgba(217,119,6,.1)",border:"1px solid rgba(217,119,6,.3)",borderRadius:"var(--r)",marginBottom:14,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <span style={{fontSize:13,color:"var(--ylw)",flex:1}}>
            ⚠ Los productos no tienen precio público separado. Importa <b>catalogo_hikvision.json</b> para activar los dos precios (instalador + público).
          </span>
          <button className="btn bylw bsm" onClick={()=>setJsonOpen(true)}><Ic d={I.download} s={13}/>Importar JSON ahora</button>
        </div>
      )}

      {!selectedCat ? (
        <>
          <div className="ph">
            <div><div className="pt">Catálogo de <span>Productos</span></div><div className="ps">{products.length} productos en total</div></div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button className="btn bg" onClick={()=>setJsonOpen(true)}><Ic d={I.download} s={14}/>Importar JSON</button>
              <button className="btn bg" onClick={()=>setImpOpen(true)}><Ic d={I.upload} s={14}/>Importar Excel</button>
              <button className="btn bd bsm" onClick={()=>setConfirmDeleteAll(true)} title="Eliminar todos los productos"><Ic d={I.trash} s={13}/>Eliminar todo</button>
              <button className="btn bp" onClick={()=>setModal({category:"Cámaras"})}><Ic d={I.plus} s={14}/>Nuevo Producto</button>

          {buckets.length===0 ? (
            <div className="card empty"><p>Sin productos. Importa un Excel o crea uno nuevo.</p></div>
          ) : (
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14}}>
              {buckets.map(b=>{
                const brs=uniqVals(b.items,"brand");
                const minP=Math.min(...b.items.map(x=>x.price||0));
                const maxP=Math.max(...b.items.map(x=>x.price||0));
                return (
                  <div key={b.cat} onClick={()=>{setSelectedCat(b.cat);setFilters({...DEF_FILTERS});setSelected(new Set());}}
                    style={{background:"var(--bg2)",border:"1px solid var(--b1)",borderRadius:"var(--r2)",padding:"18px 20px",cursor:"pointer",transition:"all .15s"}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--acc)";e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="var(--acc-glow)";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--b1)";e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="";}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <CatBadge cat={b.cat}/><Ic d={I.arrow} s={16}/>
                    </div>
                    <div style={{fontFamily:"var(--fh)",fontSize:18,fontWeight:800,marginBottom:4}}>{b.cat}</div>
                    <div style={{fontSize:12,color:"var(--txt2)",marginBottom:11}}>{b.items.length} productos · {brs.length} marca(s)</div>
                    <div style={{fontSize:11,color:"var(--txt3)",fontFamily:"var(--fm)"}}>
                      Desde <span className="tc fw7">{fmt(minP)}</span> hasta <span className="tc fw7">{fmt(maxP)}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </>
      ) : (
        (() => {
          const inCat = products.filter(p=>p.category===selectedCat);
          const filtered = applyFilters(inCat, {...filters, cat:"Todos"});
          const filteredIds = filtered.map(p=>p.id);
          const allSelected = filteredIds.length>0 && filteredIds.every(id=>selected.has(id));
          return (
            <>
              <div className="ph">
                <div style={{display:"flex",alignItems:"center",gap:14}}>
                  <button className="btn bg bsm" onClick={()=>{setSelectedCat(null);setSelected(new Set());}}><Ic d={I.back} s={13}/>Categorías</button>
                  <div><div className="pt">{selectedCat}</div><div className="ps">{filtered.length} de {inCat.length} productos</div></div>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {selected.size>0&&<button className="btn bd bsm" onClick={delSelected}><Ic d={I.trash} s={13}/>Eliminar {selected.size} selec.</button>}
                  <button className="btn bg" onClick={()=>setJsonOpen(true)}><Ic d={I.download} s={14}/>Importar JSON</button>
                  <button className="btn bg" onClick={()=>setImpOpen(true)}><Ic d={I.upload} s={14}/>Importar Excel</button>
                  <button className="btn bp" onClick={()=>setModal({category:selectedCat})}><Ic d={I.plus} s={14}/>Nuevo</button>
                </div>
              </div>
              <div className="card">
                <CategoryFiltersBar products={inCat} filters={filters} setF={setFilters}/>
                {filtered.length===0?<div className="empty"><p>Sin productos que coincidan</p></div>:
                <div className="twrap"><table>
                  <thead><tr>
                    <th style={{width:36}}>
                      <input type="checkbox" checked={allSelected} onChange={()=>toggleSelectAll(filteredIds)}
                        style={{width:15,height:15,cursor:"pointer"}}/>
                    </th>
                    <th></th><th>Producto</th><th>Subcategoría</th><th>Marca</th><th>Resolución</th>
                    <th style={{textAlign:"right"}}>P. Instalador</th>
                    <th style={{textAlign:"right"}}>P. Público</th>
                    <th></th>
                  </tr></thead>
                  <tbody>{filtered.map(p=>(
                    <tr key={p.id} style={{background:selected.has(p.id)?"rgba(220,38,38,.04)":""}}>
                      <td>
                        <input type="checkbox" checked={selected.has(p.id)} onChange={()=>toggleSelect(p.id)}
                          style={{width:15,height:15,cursor:"pointer"}}/>
                      </td>
                      <td style={{width:44}}>{p.image?<img src={p.image} className="img-th"/>:<div style={{width:36,height:36,borderRadius:5,background:"var(--bg4)",border:"1px solid var(--b1)",display:"flex",alignItems:"center",justifyContent:"center",opacity:.35}}><Ic d={I.img} s={13}/></div>}</td>
                      <td>
                        <div className="fw6">{p.model||p.name}</div>
                        {p.description&&<div className="txs t3" style={{maxWidth:260,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.description}</div>}
                        {!p.description&&p.name!==p.model&&<div className="txs t3">{p.name}</div>}
                      </td>
                      <td className="ts t2">{p.subcategory||p.cameraType||"—"}</td>
                      <td className="ts t2">{p.brand||"—"}</td>
                      <td className="ts fm t2">{p.resolution||"—"}</td>
                      <td className="fm fw6 tc" style={{textAlign:"right"}}>{fmt(p.price)}</td>
                      <td className="fm fw6" style={{textAlign:"right",color:"var(--grn)"}}>{p.pricePublic?fmt(p.pricePublic):"—"}</td>
                      <td>
                        <div style={{display:"flex",gap:5,justifyContent:"flex-end"}}>
                          <button className="btn bg bic" onClick={()=>setModal(p)}><Ic d={I.edit} s={13}/></button>
                          <button className="btn bd bic" onClick={()=>del(p.id)}><Ic d={I.trash} s={13}/></button>
                        </div>
                      </td>
                    </tr>
                  ))}</tbody>
                </table></div>}
              </div>
            </>
          );
        })()
      )}
    </div>
  );
}

function ClientModal({initial, onSave, onClose}) {
  const isEdit = initial && initial.id;
  const [f,setF]=useState(initial||{name:"",phone:"",email:"",address:"",rfc:"",notes:"",discount:0,markup:0});
  const s=(k,v)=>setF(x=>({...x,[k]:v}));
  
  const handleSave = () => {
    onSave(f);
  };
  
  return (
    <Modal onClose={onClose}>
      <div className="mt2">{isEdit?"Editar Cliente":"Nuevo Cliente"}</div>
      <div className="gr gr2">
        <div className="fl"><label className="lb">Nombre / Empresa*</label><input className="inp" value={f.name} onChange={e=>s("name",e.target.value)} placeholder="Juan García"/></div>
        <div className="fl"><label className="lb">Teléfono</label><input className="inp" value={f.phone} onChange={e=>s("phone",e.target.value)} placeholder="55 1234 5678"/></div>
      </div>
      <div className="gr gr2">
        <div className="fl"><label className="lb">Email</label><input className="inp" value={f.email} onChange={e=>s("email",e.target.value)} placeholder="correo@empresa.com"/></div>
        <div className="fl"><label className="lb">RFC / NIF</label><input className="inp" value={f.rfc} onChange={e=>s("rfc",e.target.value)} placeholder="RFC123456"/></div>
      </div>
      <div className="fl mb8"><label className="lb">Dirección</label><input className="inp" value={f.address} onChange={e=>s("address",e.target.value)} placeholder="Calle, Colonia, Ciudad"/></div>
      <div className="gr gr2">
        <div className="fl">
          <label className="lb">Descuento (%)</label>
          <input className="inp" type="number" min="0" max="100" step="0.5" value={f.discount||0} onChange={e=>s("discount",parseFloat(e.target.value)||0)}/>
          <span style={{fontSize:10,color:"var(--txt3)",marginTop:3}}>Se resta del precio público</span>
        </div>
        <div className="fl">
          <label className="lb">Incremento (%)</label>
          <input className="inp" type="number" min="0" max="200" step="0.5" value={f.markup||0} onChange={e=>s("markup",parseFloat(e.target.value)||0)}/>
          <span style={{fontSize:10,color:"var(--txt3)",marginTop:3}}>Se suma al precio público</span>
        </div>
      </div>
      <div className="fl mb8"><label className="lb">Notas</label><textarea className="ta" value={f.notes} onChange={e=>s("notes",e.target.value)} placeholder="Notas del cliente..." style={{minHeight:100,resize:"vertical"}}/></div>
      <div className="mf">
        <button className="btn bg" onClick={onClose}>Cancelar</button>
        <button className="btn bp" disabled={!f.name.trim()} onClick={handleSave}><Ic d={I.check} s={14}/>Guardar</button>
      </div>
    </Modal>
  );
}

function Clients({clients, setClients, deleteClient}) {
  const [modal,setModal]=useState(null);
  const [srch,setSrch]=useState("");
  const [toastEl,showToast]=useToast();
  const filtered=clients.filter(c=>c.name.toLowerCase().includes(srch.toLowerCase())||c.phone?.includes(srch)||c.email?.toLowerCase().includes(srch.toLowerCase()));

  const doSave = async form => {
    try {
      if(modal && modal.id) await setClients(clients.map(c=>c.id===modal.id?{...c,...form}:c));
      else await setClients([...clients,{id:uid(),...form}]);
      setModal(null);
      showToast("✓ Cliente guardado");
    } catch(e) {
      console.error("Error al guardar cliente:", e);
      showToast("❌ Error al guardar cliente", "error");
    }
  };
  const del = async id => {
    if(!confirm("¿Eliminar cliente?")) return;
    await deleteClient(id); showToast("Cliente eliminado","info");
  };

  return (
    <div className="page">
      {toastEl}
      {modal&&<ClientModal initial={modal.id?modal:null} onSave={doSave} onClose={()=>setModal(null)}/>}
      <div className="ph">
        <div><div className="pt">Mis <span>Clientes</span></div><div className="ps">{clients.length} clientes</div></div>
        <button className="btn bp" onClick={()=>setModal({})}><Ic d={I.plus} s={14}/>Nuevo Cliente</button>
      </div>
      <div className="card">
        <div className="sw" style={{marginBottom:13}}><Ic d={I.search} s={14}/><input className="inp si" value={srch} onChange={e=>setSrch(e.target.value)} placeholder="Buscar cliente..."/></div>
        {filtered.length===0?<div className="empty"><p>Sin clientes registrados</p></div>:
        <div className="twrap"><table>
          <thead><tr><th>Nombre / Empresa</th><th>Teléfono</th><th>Email</th><th>Descuento</th><th>Incremento</th><th>Dirección</th><th></th></tr></thead>
          <tbody>{filtered.map(c=>(
            <tr key={c.id}>
              <td className="fw6">{c.name}</td>
              <td className="ts t2 fm">{c.phone||"—"}</td>
              <td className="ts t2">{c.email||"—"}</td>
              <td>{c.discount>0?<span className="badge bst">{c.discount}% dto.</span>:<span className="t3 ts">—</span>}</td>
              <td>{c.markup>0?<span className="badge bg2b">+{c.markup}%</span>:<span className="t3 ts">—</span>}</td>
              <td className="ts t2" style={{maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.address||"—"}</td>
              <td>
                <div style={{display:"flex",gap:5,justifyContent:"flex-end"}}>
                  <button className="btn bg bic" onClick={()=>setModal(c)}><Ic d={I.edit} s={13}/></button>
                  <button className="btn bd bic" onClick={()=>del(c.id)}><Ic d={I.trash} s={13}/></button>
                </div>
              </td>
            </tr>
          ))}</tbody>
        </table></div>}
      </div>
    </div>
  );
}
