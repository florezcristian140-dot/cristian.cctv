function ViewQuoteModal({quote, company, onClose}) {
  const sub=quote.items.reduce((s,i)=>s+i.qty*i.unitPrice,0);
  const discountAmt=quote.discountPct>0?sub*(quote.discountPct/100):(quote.discount||0);
  const taxAmt=(sub-discountAmt)*(quote.tax/100);
  const total=sub-discountAmt+taxAmt+(quote.shipping||0);
  return (
    <Modal onClose={onClose} wide={true}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
        <div>
          <div className="mt2" style={{marginBottom:2}}>Cotización #{quote.id.slice(-6).toUpperCase()}</div>
          <div className="ts t2">{quote.date} · <span style={{color:quote.status==="sent"?"var(--grn)":"var(--ylw)"}}>{quote.status==="sent"?"Enviada":"Borrador"}</span>
          {quote.createdByRole&&<span className="badge bo" style={{fontSize:10,marginLeft:8}}>{quote.createdByRole==="installer"?"Instalador":quote.createdByRole==="guest"?"Visitante":"Admin"}</span>}
          </div>
        </div>
        <button className="btn bprp bsm" onClick={()=>exportPDF(quote,company)}><Ic d={I.pdf} s={14}/>Exportar PDF</button>
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div className="ct" style={{marginBottom:8}}>Cliente</div>
        <div className="fw7" style={{fontSize:14}}>{quote.clientName}</div>
        <div className="ts t2" style={{marginTop:3,lineHeight:1.7}}>
          {quote.clientPhone&&<span>{quote.clientPhone} · </span>}{quote.clientEmail||""}
          {quote.clientAddress&&<><br/>{quote.clientAddress}</>}
          {quote.clientRFC&&<><br/>RFC: {quote.clientRFC}</>}
        </div>
      </div>
      <div className="twrap" style={{marginBottom:12}}>
        <table><thead><tr><th>Producto</th><th>Cant.</th><th>P. Unit.</th><th style={{textAlign:"right"}}>Total</th></tr></thead>
        <tbody>{quote.items.map((it,i)=>(
          <tr key={i}>
            <td><div style={{display:"flex",alignItems:"center",gap:8}}>
              {it.image&&<img src={it.image} style={{width:34,height:34,objectFit:"contain",borderRadius:4,border:"1px solid var(--b1)",flexShrink:0}}/>}
              <div><div className="fw6">{it.name}</div>{it.model&&<div className="txs t3">{it.model}</div>}</div>
            </div></td>
            <td className="fm ts">{it.qty} {it.unit}</td>
            <td className="fm ts">{fmt(it.unitPrice)}</td>
            <td className="fm fw6 tc" style={{textAlign:"right"}}>{fmt(it.qty*it.unitPrice)}</td>
          </tr>
        ))}</tbody></table>
      </div>
      <div className="tb2">
        <div className="tr2"><span className="t2">Subtotal</span><span className="fm">{fmt(sub)}</span></div>
        {discountAmt>0&&<div className="tr2 tg"><span>Descuento{quote.discountPct>0?` (${quote.discountPct}%)`:""}</span><span className="fm">-{fmt(discountAmt)}</span></div>}
        {(quote.shipping||0)>0&&<div className="tr2"><span className="t2">Flete</span><span className="fm">{fmt(quote.shipping)}</span></div>}
        <div className="tr2"><span className="t2">IVA {quote.tax}%</span><span className="fm">{fmt(taxAmt)}</span></div>
        <div className="tr2 fin"><span>TOTAL</span><span className="fm tc">{fmt(total)}</span></div>
      </div>
      {quote.notes&&<div className="card" style={{marginTop:12}}><div className="ct" style={{marginBottom:6}}>Notas</div><div style={{fontSize:12,color:"var(--txt2)",whiteSpace:"pre-wrap"}}>{quote.notes}</div></div>}
      <div className="mf"><button className="btn bg" onClick={onClose}>Cerrar</button></div>
    </Modal>
  );
}

function NewQuote({products, quotes, setQuotes, clients, company, onSaved, editingQuote}) {
  const { user } = useAuth();
  const [cl,setCl]=useState(editingQuote ? {
    name: editingQuote.clientName,
    phone: editingQuote.clientPhone || "",
    email: editingQuote.clientEmail || "",
    address: editingQuote.clientAddress || "",
    rfc: editingQuote.clientRFC || ""
  } : {name:"",phone:"",email:"",address:"",rfc:""});
  const [selCl,setSelCl]=useState("");
  const [items,setItems]=useState(editingQuote ? editingQuote.items : []);
  const [notes,setNotes]=useState(editingQuote ? editingQuote.notes : (company.paymentTerms?`Condiciones de pago: ${company.paymentTerms}`:""));
  const [tax,setTax]=useState(editingQuote ? editingQuote.tax : (company.defaultTax||16));
  const [discount,setDiscount]=useState(editingQuote ? (editingQuote.discount || 0) : 0);
  const [shipping,setShipping]=useState(editingQuote ? (editingQuote.shipping || 0) : 0);
  const [status,setStatus]=useState(editingQuote ? editingQuote.status : "draft");
  const [docType,setDocType]=useState(editingQuote ? (editingQuote.docType || "quote") : "quote");
  const [invoiceNumber,setInvoiceNumber]=useState(editingQuote ? (editingQuote.invoiceNumber || "") : "");
  const [ps,setPs]=useState("");
  const [showP,setShowP]=useState(false);
  const [filters,setFilters]=useState(DEF_FILTERS);
  const [toastEl,showToast]=useToast();
  const [sending,setSending]=useState(false);

  const pickCl=id=>{if(!id){setSelCl("");setCl({name:"",phone:"",email:"",address:"",rfc:""});return;}const c=clients.find(x=>x.id===id);if(c){setSelCl(id);setCl({name:c.name,phone:c.phone||"",email:c.email||"",address:c.address||"",rfc:c.rfc||""});}};
  const fp=applyFilters(products,{...filters,srch:ps||filters.srch});
  const addItem=p=>{const ex=items.find(i=>i.productId===p.id);if(ex){setItems(items.map(i=>i.productId===p.id?{...i,qty:i.qty+1}:i));}else{setItems([...items,{productId:p.id,name:p.name,model:p.model,unit:p.unit,unitPrice:p.price,qty:1,image:p.image||null}]);}setPs("");setShowP(false);};
  const updQty=(id,q)=>{if(q<1)return;setItems(items.map(i=>i.productId===id?{...i,qty:q}:i));};
  const updP=(id,p)=>setItems(items.map(i=>i.productId===id?{...i,unitPrice:parseFloat(p)||0}:i));
  const rm=id=>setItems(items.filter(i=>i.productId!==id));

  const sub=items.reduce((s,i)=>s+i.qty*i.unitPrice,0);
  const taxAmt=sub*(tax/100);
  const total=sub+taxAmt+Number(shipping)-Number(discount);
  const canSave=cl.name.trim()&&items.length>0;

  const doSave = async () => {
    setSending(true);
    
    if (editingQuote) {
      // Modo edición: actualizar cotización existente
      const updatedQuote = {
        ...editingQuote,
        clientName:cl.name,
        clientPhone:cl.phone,
        clientEmail:cl.email,
        clientAddress:cl.address,
        clientRFC:cl.rfc,
        items,
        notes,
        tax:Number(tax),
        discount:Number(discount),
        shipping:Number(shipping),
        status,
        docType,
        invoiceNumber: docType === "invoice" ? invoiceNumber : "",
        _tsUpdated:Date.now()
      };
      const updatedQuotes = quotes.map(q => q.id === editingQuote.id ? updatedQuote : q);
      await setQuotes(updatedQuotes);
      showToast(docType === "invoice" ? "✓ Factura actualizada" : "✓ Cotización actualizada");
    } else {
      // Modo creación: nueva cotización
      const q={id:uid(),_ts:Date.now(),date:today(),validUntil:addDays(company.validityDays||15),
        clientName:cl.name,clientPhone:cl.phone,clientEmail:cl.email,clientAddress:cl.address,clientRFC:cl.rfc,
        items,notes,tax:Number(tax),discount:Number(discount),discountPct:0,shipping:Number(shipping),status,
        docType,
        invoiceNumber: docType === "invoice" ? invoiceNumber : "",
        createdBy:user?.id||"admin",createdByRole:user?.role||"admin"};
      await setQuotes([...quotes,q]);
      if(status==="sent") {
        const emailRes = await sendQuoteEmail(q, company);
        if(emailRes.ok) showToast(docType === "invoice" ? "✓ Factura guardada y enviada por email" : "✓ Cotización guardada y enviada por email");
        else showToast(docType === "invoice" ? "✓ Factura guardada (email no configurado)" : "✓ Cotización guardada (email no configurado)","info");
      } else {
        showToast(docType === "invoice" ? "✓ Factura guardada como borrador" : "✓ Cotización guardada como borrador");
      }
    }
    
    setSending(false);
    setTimeout(()=>onSaved(),800);
  };

  return (
    <div className="page">
      {toastEl}
      <div className="ph">
        <div><div className="pt">{editingQuote ? "Editar" : (docType === "invoice" ? "Nueva" : "Nueva")} <span>{docType === "invoice" ? "Factura" : "Cotización"}</span></div><div className="ps">{editingQuote ? `Modifica los datos de la ${docType === "invoice" ? "factura" : "cotización"}` : "Completa los datos y agrega productos"}</div></div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <select className="sel" style={{width:140}} value={docType} onChange={e=>setDocType(e.target.value)}>
            <option value="quote">Cotización</option>
            <option value="invoice">Factura</option>
          </select>
          <select className="sel" style={{width:140}} value={status} onChange={e=>setStatus(e.target.value)}>
            <option value="draft">Borrador</option><option value="sent">Enviada</option>
          </select>
          <button className="btn bp" disabled={!canSave||sending} onClick={doSave}><Ic d={I.check} s={14}/>{sending?"Guardando...":"Guardar"}</button>
        </div>
      </div>
      <div className="stk-mob" style={{display:"grid",gridTemplateColumns:"1fr 305px",gap:16}}>
        <div>
          <div className="card" style={{marginBottom:13}}>
            <div className="ct" style={{marginBottom:12}}>Datos del cliente</div>
            {docType === "invoice" && (
              <div className="fl mb10">
                <label className="lb">Número de Factura*</label>
                <input className="inp" value={invoiceNumber} onChange={e=>setInvoiceNumber(e.target.value)} placeholder="F-2024-001" style={{fontFamily:"var(--fm)",fontWeight:600}}/>
              </div>
            )}
            {clients.length>0&&(
              <div className="fl mb10">
                <label className="lb">Seleccionar cliente registrado (opcional)</label>
                <select className="sel" value={selCl} onChange={e=>pickCl(e.target.value)}>
                  <option value="">— Ingresar manualmente —</option>

function QuotesList({quotes, setQuotes, deleteQuote, company, setView, onEdit}) {
  const [viewing,setViewing]=useState(null);
  const [srch,setSrch]=useState("");
  const [docTypeFilter,setDocTypeFilter]=useState("all"); // "all", "quote", "invoice"
  const [toastEl,showToast]=useToast();
  const sorted=[...quotes]
    .filter(q=>q.clientName.toLowerCase().includes(srch.toLowerCase())||q.id.includes(srch))
    .filter(q=>docTypeFilter==="all"||(q.docType||"quote")===docTypeFilter)
    .sort((a,b)=>b._ts-a._ts);

  const del = async id => {
    if(!confirm("¿Eliminar cotización?")) return;
    await deleteQuote(id); showToast("Cotización eliminada","info");
  };
  const toggle = async id => {
    const up=quotes.map(q=>q.id===id?{...q,status:q.status==="sent"?"draft":"sent"}:q);
    await setQuotes(up);
  };
  
  const edit = (quote) => {
    onEdit(quote);
  };

  return (
    <div className="page">
      {toastEl}
      {viewing&&<ViewQuoteModal quote={viewing} company={company} onClose={()=>setViewing(null)}/>}
      <div className="ph">
        <div><div className="pt">Mis <span>Cotizaciones</span></div><div className="ps">{quotes.length} cotizaciones</div></div>
        <button className="btn bp" onClick={()=>setView("new")}><Ic d={I.plus} s={14}/>Nueva</button>
      </div>
      <div className="card">
        <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10,marginBottom:13}} className="filters-row">
          <div className="sw"><Ic d={I.search} s={14}/><input className="inp si" value={srch} onChange={e=>setSrch(e.target.value)} placeholder="Buscar cliente o ID..."/></div>
          <select className="sel" value={docTypeFilter} onChange={e=>setDocTypeFilter(e.target.value)} style={{width:160}}>
            <option value="all">Todos los documentos</option>
            <option value="quote">Solo Cotizaciones</option>
            <option value="invoice">Solo Facturas</option>
          </select>
        </div>
        {sorted.length===0?<div className="empty"><p>Sin cotizaciones</p></div>:
        <div className="twrap"><table>
          <thead><tr><th>#</th><th>Tipo</th><th>Cliente</th><th>Fecha</th><th>Estado</th><th>Origen</th><th style={{textAlign:"right"}}>Total</th><th></th></tr></thead>
          <tbody>{sorted.map(q=>{
            const sub=q.items.reduce((s,i)=>s+i.qty*i.unitPrice,0);
            const disc=q.discountPct>0?sub*(q.discountPct/100):(q.discount||0);
            const total=(sub-disc)*(1+q.tax/100)+(q.shipping||0);
            const docType = q.docType || "quote";
            const docLabel = docType === "invoice" ? "Factura" : "Cotización";
            return <tr key={q.id}>
              <td className="fm txs t3">#{q.id.slice(-6).toUpperCase()}</td>
              <td><span className={`badge ${docType==="invoice"?"bi":"bc"}`} style={{fontSize:10}}>{docLabel}</span></td>
              <td><div className="fw6">{q.clientName}</div>{q.clientPhone&&<div className="txs t3">{q.clientPhone}</div>}</td>
              <td className="ts t2">{q.date}</td>
              <td><span onClick={()=>toggle(q.id)} style={{cursor:"pointer",fontSize:11,color:q.status==="sent"?"var(--grn)":"var(--ylw)",fontFamily:"var(--fm)"}}>{q.status==="sent"?"● Enviada":"○ Borrador"}</span></td>
              <td><span className="badge bo" style={{fontSize:10}}>{q.createdByRole==="installer"?"Instalador":q.createdByRole==="guest"?"Visitante":"Admin"}</span></td>
              <td className="fm fw6 tc" style={{textAlign:"right"}}>{fmt(total)}</td>
              <td>
                <div style={{display:"flex",gap:5,justifyContent:"flex-end"}}>
                  <button className="btn bblu bic" title="Editar" onClick={()=>edit(q)}><Ic d={I.edit} s={13}/></button>
                  <button className="btn bprp bic" title="Ver / PDF" onClick={()=>setViewing(q)}><Ic d={I.eye} s={13}/></button>
                  <button className="btn bd bic" onClick={()=>del(q.id)}><Ic d={I.trash} s={13}/></button>
                </div>
              </td>
            </tr>;
          })}</tbody>
        </table></div>}
      </div>
    </div>
  );
}

function UserModal({initial, onSave, onClose}) {
  const isEdit = initial && initial.id;
  const [f,setF]=useState(initial||{name:"",email:"",password:"",role:"installer",discount:0,active:true});
  const s=(k,v)=>setF(x=>({...x,[k]:v}));
  
  const handleSave = () => {
    onSave(f);
  };
  
  return (
    <Modal onClose={onClose}>
      <div className="mt2">{isEdit?"Editar Usuario":"Nuevo Usuario"}</div>
      <div className="gr gr2">
        <div className="fl"><label className="lb">Nombre completo*</label><input className="inp" value={f.name} onChange={e=>s("name",e.target.value)} placeholder="Juan García"/></div>
        <div className="fl"><label className="lb">Email*</label><input className="inp" type="email" value={f.email} onChange={e=>s("email",e.target.value)} placeholder="usuario@empresa.com"/></div>
      </div>
      <div className="gr gr2">
        <div className="fl">
          <label className="lb">Contraseña{isEdit?" (dejar vacío = no cambiar)":""}</label>
          <input className="inp" type="password" value={f.password} onChange={e=>s("password",e.target.value)} placeholder={isEdit?"••••••••":"Mínimo 6 caracteres"}/>
        </div>
        <div className="fl">
          <label className="lb">Rol</label>
          <select className="sel" value={f.role} onChange={e=>s("role",e.target.value)}>
            <option value="admin">Administrador</option>
            <option value="installer">Instalador</option>
          </select>
        </div>
      </div>
      {f.role==="installer"&&(
        <div className="gr gr2">
          <div className="fl mb10">
            <label className="lb">Descuento (%)</label>
            <input className="inp" type="number" min="0" max="100" value={f.discount||0} onChange={e=>s("discount",parseFloat(e.target.value)||0)} placeholder="0"/>
            <span style={{fontSize:10,color:"var(--txt3)",marginTop:3}}>Se resta del precio público en sus cotizaciones</span>
          </div>
          <div className="fl mb10">
            <label className="lb">Incremento (%)</label>
            <input className="inp" type="number" min="0" max="200" value={f.markup||0} onChange={e=>s("markup",parseFloat(e.target.value)||0)} placeholder="0"/>
            <span style={{fontSize:10,color:"var(--txt3)",marginTop:3}}>Se suma al precio público (si aplica)</span>
          </div>
        </div>
      )}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
        <input type="checkbox" id="uactive" checked={f.active} onChange={e=>s("active",e.target.checked)} style={{width:16,height:16}}/>
        <label htmlFor="uactive" style={{fontSize:13,cursor:"pointer"}}>Usuario activo</label>
      </div>
      <div className="mf">
        <button className="btn bg" onClick={onClose}>Cancelar</button>
        <button className="btn bp" disabled={!f.name.trim()||!f.email.trim()||(!isEdit&&!f.password)} onClick={handleSave}><Ic d={I.check} s={14}/>Guardar</button>
      </div>
    </Modal>
  );
}

function UsersManager({users, setUsers, deleteUser}) {
  const [modal,setModal]=useState(null);
  const [toastEl,showToast]=useToast();

  const doSave = async form => {
    try {
      if(modal && modal.id) {
        const updated = {...modal, ...form};
        if(!form.password) delete updated.password; // keep existing if blank
        await setUsers(users.map(u=>u.id===modal.id?updated:u));
      } else {
        await setUsers([...users, {id:uid(), ...form}]);
      }
      setModal(null); 
      showToast("✓ Usuario guardado");
    } catch(e) {
      console.error("Error al guardar usuario:", e);
      showToast("❌ Error al guardar usuario", "error");
    }
  };

  const del = async id => {
    if(!confirm("¿Eliminar usuario?")) return;
    await deleteUser(id); showToast("Usuario eliminado","info");
  };

  const toggleActive = async (id) => {
    await setUsers(users.map(u=>u.id===id?{...u,active:!u.active}:u));
  };

  return (
    <div className="page">
      {toastEl}
      {modal&&<UserModal initial={modal} onSave={doSave} onClose={()=>setModal(null)}/>}
      <div className="ph">
        <div><div className="pt">Gestión de <span>Usuarios</span></div><div className="ps">{users.length} usuarios registrados</div></div>
        <button className="btn bp" onClick={()=>setModal({})}><Ic d={I.plus} s={14}/>Nuevo Usuario</button>
      </div>
      <div style={{padding:"12px 16px",background:"var(--ylw-dim)",border:"1px solid rgba(217,119,6,.25)",borderRadius:"var(--r)",marginBottom:16,fontSize:12,color:"var(--ylw)"}}>
        <b>Nota:</b> En modo local (sin Firebase), las contraseñas se guardan en localStorage. Para producción, configura Firebase Auth para mayor seguridad.
      </div>
      <div className="card">
        {users.length===0?<div className="empty"><p>Sin usuarios</p></div>:
        <div className="twrap"><table>
          <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Descuento</th><th>Incremento</th><th>Estado</th><th></th></tr></thead>
          <tbody>{users.map(u=>(
            <tr key={u.id}>
              <td className="fw6">{u.name}</td>
              <td className="ts t2 fm">{u.email}</td>
              <td><RoleBadge role={u.role}/></td>
              <td>{u.role==="installer"&&u.discount>0?<span className="badge bst">{u.discount}% dto.</span>:<span className="t3 ts">—</span>}</td>
              <td>{u.role==="installer"&&u.markup>0?<span className="badge bg2b">+{u.markup}%</span>:<span className="t3 ts">—</span>}</td>
              <td>
                <span onClick={()=>toggleActive(u.id)} style={{cursor:"pointer",fontSize:11,fontFamily:"var(--fm)",color:u.active?"var(--grn)":"var(--txt3)"}}>
                  {u.active?"● Activo":"○ Inactivo"}
                </span>
              </td>
              <td>
                <div style={{display:"flex",gap:5,justifyContent:"flex-end"}}>
                  <button className="btn bg bic" onClick={()=>setModal(u)}><Ic d={I.edit} s={13}/></button>
                  <button className="btn bd bic" onClick={()=>del(u.id)}><Ic d={I.trash} s={13}/></button>
                </div>
              </td>
            </tr>
          ))}</tbody>
        </table></div>}
      </div>
    </div>
  );
}

      {/* EmailJS Config */}
      <div className="card" style={{marginTop:15}}>
        <div className="ct" style={{marginBottom:13}}>Configuración de Email (EmailJS)</div>
        <div style={{fontSize:12,color:"var(--txt2)",marginBottom:14,lineHeight:1.7}}>
          Para enviar cotizaciones por email, crea una cuenta gratuita en <a href="https://www.emailjs.com" target="_blank" style={{color:"var(--acc)"}}>emailjs.com</a> y completa estos datos.<br/>
          También puedes editar directamente el archivo <code style={{color:"var(--acc)"}}>index.html</code> en la sección <code>EMAILJS_CONFIG</code>.
        </div>
        <div className="gr gr2">
          <div className="fl"><label className="lb">Public Key</label><input className="inp" value={ejCfg.publicKey||""} onChange={e=>setEjCfg(x=>({...x,publicKey:e.target.value}))} placeholder="user_xxxxxxxx"/></div>
          <div className="fl"><label className="lb">Service ID</label><input className="inp" value={ejCfg.serviceId||""} onChange={e=>setEjCfg(x=>({...x,serviceId:e.target.value}))} placeholder="service_xxxxxxxx"/></div>
        </div>
        <div className="gr gr2">
          <div className="fl"><label className="lb">Template ID</label><input className="inp" value={ejCfg.templateId||""} onChange={e=>setEjCfg(x=>({...x,templateId:e.target.value}))} placeholder="template_xxxxxxxx"/></div>
          <div className="fl"><label className="lb">Email del administrador</label><input className="inp" type="email" value={ejCfg.adminEmail||""} onChange={e=>setEjCfg(x=>({...x,adminEmail:e.target.value}))} placeholder="tu@correo.com"/></div>
        </div>
        <button className="btn bblu bsm" onClick={saveEmailJS}><Ic d={I.mail} s={13}/>Aplicar configuración EmailJS</button>
      </div>

      {/* Firebase Config info */}
      <div className="card" style={{marginTop:15}}>
        <div className="ct" style={{marginBottom:10}}>Estado de Firebase</div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:window.USE_FIREBASE?"var(--grn)":"var(--ylw)",flexShrink:0}}/>
          <div style={{fontSize:13}}>
            {window.USE_FIREBASE
              ? <span style={{color:"var(--grn)"}}>Firebase conectado — datos sincronizados en la nube</span>
              : <span style={{color:"var(--ylw)"}}>Modo local (localStorage) — edita <code>index.html</code> con tus credenciales de Firebase para activar la nube</span>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// SECCIÓN 20 — APP ROOT
// ═══════════════════════════════════════════════════════════════════════════════

function AppShell() {
  const { user, authReady, logout } = useAuth();
  const data = useData();
  const [view, setView] = useState("catalog");
  const [menuOpen, setMenuOpen] = useState(false);
  const [guestMode, setGuestMode] = useState(true); // arranca en modo visitante por defecto
  const [showLogin, setShowLogin] = useState(false); // modal de login
  const [editingQuote, setEditingQuote] = useState(null); // cotización en edición

  // Determine effective role
  const role = user?.role || (guestMode ? "guest" : null);

  // Reset view when role changes
  useEffect(() => {
    if(role === "admin") setView("dashboard");
    else if(role === "installer" || role === "guest") setView("catalog");
  }, [role]);

  // Cuando el usuario inicia sesión, cerrar el modal
  useEffect(() => { if(user) setShowLogin(false); }, [user]);
  
  // Handler para editar cotización
  const handleEditQuote = (quote) => {
    setEditingQuote(quote);
    setView("new");
  };
  
  // Handler para cuando se guarda una cotización
  const handleQuoteSaved = () => {
    setEditingQuote(null);
    setView("quotes");
  };

  if(!authReady || data.loading) {
    return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
        <div className="spinner"/>
        <div style={{fontSize:13,color:"var(--txt3)"}}>Cargando...</div>
      </div>
    );
  }

  // Si no hay rol (no debería pasar con guestMode=true, pero por seguridad)
  if(!role) {
    return <LoginScreen onGuestAccess={()=>setGuestMode(true)}/>;
  }

  const goView = v => { setView(v); setMenuOpen(false); };

  // Navigation items by role
  const adminNav = [
    {sec:"Principal"},
    {id:"dashboard",label:"Dashboard",ic:I.dash},
    {sec:"Gestión"},
    {id:"inventory",label:"Catálogo",ic:I.inv},
    {id:"clients",label:"Clientes",ic:I.users},
    {sec:"Cotizaciones"},
    {id:"new",label:"Nueva Cotización",ic:I.plus},
    {id:"quotes",label:"Mis Cotizaciones",ic:I.quote},
    {sec:"Sistema"},
    {id:"users",label:"Usuarios",ic:I.lock},
    {id:"settings",label:"Configuración",ic:I.settings},
  ];

  const installerNav = [
    {sec:"Catálogo"},
    {id:"catalog",label:"Ver Catálogo",ic:I.inv},
    {sec:"Mis Cotizaciones"},
    {id:"myquotes",label:"Mis Cotizaciones",ic:I.quote},
  ];

  const guestNav = [
    {sec:"Catálogo"},
    {id:"catalog",label:"Ver Catálogo",ic:I.inv},
  ];

  const nav = role==="admin" ? adminNav : role==="installer" ? installerNav : guestNav;

  // My quotes for installer/guest
  const myQuotes = data.quotes.filter(q => user ? q.createdBy===user.id : q.createdByRole==="guest");

  return (
    <CartProvider>
      <div className="app">
        {/* Sidebar */}
        <aside className="sb">
          <div className="sb-logo">
            {data.company.logo
              ? <img src={data.company.logo} style={{width:36,height:36,objectFit:"contain",borderRadius:9,border:"1px solid var(--b1)",background:"var(--bg4)",padding:2}}/>
              : <div className="logo-ic"><Ic d={I.cam} s={17} stroke="#fff"/></div>}
            <div style={{flex:1,minWidth:0}}>
              <div className="logo-t">{data.company.name.length>15?data.company.name.slice(0,13)+"…":data.company.name}</div>
              <div className="logo-s">Cotizador</div>
            </div>
            <button className="mob-toggle" onClick={()=>setMenuOpen(o=>!o)} aria-label="Menú">
              <Ic d={menuOpen?I.x:"M3 12h18 M3 6h18 M3 18h18"} s={20}/>
            </button>
          </div>

          <nav className={`nav${menuOpen?" open":""}`}>
            {/* User info */}
            <div style={{padding:"10px 11px 6px",marginBottom:4}}>
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:"var(--bg4)",borderRadius:"var(--r)"}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:"var(--acc)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <Ic d={I.user} s={14} stroke="#fff"/>
                </div>
                <div style={{minWidth:0,flex:1}}>
                  <div style={{fontSize:12,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user?.name||"Visitante"}</div>
                  <RoleBadge role={role}/>
                </div>
              </div>
            </div>

            {nav.map((n,i) => n.sec
              ? <div key={i} className="nav-sec">{n.sec}</div>
              : <button key={n.id} className={`ni${view===n.id?" on":""}`} onClick={()=>goView(n.id)}>
                  <Ic d={n.ic} s={15}/>{n.label}
                </button>
            )}

            {/* Logout / Login */}
            <div style={{padding:"8px 9px",marginTop:4}}>
              {user ? (
                <button className="ni" onClick={logout} style={{color:"var(--red)"}}>
                  <Ic d={I.logout} s={15}/>Cerrar sesión
                </button>
              ) : (
                <button className="ni" onClick={()=>setShowLogin(true)} style={{color:"var(--blu)",background:"var(--blu-dim)"}}>
                  <Ic d={I.lock} s={15}/>Iniciar sesión
                </button>
              )}
            </div>
          </nav>

          <div style={{padding:"11px 16px",borderTop:"1px solid var(--b1)",fontSize:9,color:"var(--txt3)",fontFamily:"var(--fm)",letterSpacing:1}}>
            {data.products.length} prods · {data.quotes.length} cots · {data.clients.length} cls
          </div>
        </aside>

        {/* Main content */}
        <main className="main">
          {/* ADMIN views */}
          {role==="admin" && view==="dashboard" && <Dashboard products={data.products} quotes={data.quotes} clients={data.clients} setView={setView}/>}
          {role==="admin" && view==="inventory" && <Inventory products={data.products} setProducts={data.setProducts} deleteProduct={data.deleteProduct}/>}
          {role==="admin" && view==="clients" && <Clients clients={data.clients} setClients={data.setClients} deleteClient={data.deleteClient}/>}
          {role==="admin" && view==="new" && <NewQuote products={data.products} quotes={data.quotes} setQuotes={data.setQuotes} clients={data.clients} company={data.company} onSaved={handleQuoteSaved} editingQuote={editingQuote}/>}
          {role==="admin" && view==="quotes" && <QuotesList quotes={data.quotes} setQuotes={data.setQuotes} deleteQuote={data.deleteQuote} company={data.company} setView={setView} onEdit={handleEditQuote}/>}
          {role==="admin" && view==="users" && <UsersManager users={data.users} setUsers={data.setUsers} deleteUser={data.deleteUser}/>}
          {role==="admin" && view==="settings" && <Settings company={data.company} setCompany={data.setCompany}/>}
          {/* Also allow admin to see catalog */}
          {role==="admin" && view==="catalog" && <PublicCatalog products={data.products} company={data.company} quotes={data.quotes} setQuotes={data.setQuotes} clients={data.clients}/>}

          {/* INSTALLER views */}
          {role==="installer" && view==="catalog" && <PublicCatalog products={data.products} company={data.company} quotes={data.quotes} setQuotes={data.setQuotes} clients={data.clients}/>}
          {role==="installer" && view==="myquotes" && (
            <div className="page">
              <div className="ph"><div><div className="pt">Mis <span>Cotizaciones</span></div><div className="ps">{myQuotes.length} cotizaciones generadas</div></div></div>
              <div className="card">
                {myQuotes.length===0?<div className="empty"><p>Aún no has generado cotizaciones</p></div>:
                <div className="twrap"><table>
                  <thead><tr><th>#</th><th>Cliente</th><th>Fecha</th><th style={{textAlign:"right"}}>Total</th><th></th></tr></thead>
                  <tbody>{[...myQuotes].sort((a,b)=>b._ts-a._ts).map(q=>{
                    const sub=q.items.reduce((s,i)=>s+i.qty*i.unitPrice,0);
                    const disc=q.discountPct>0?sub*(q.discountPct/100):(q.discount||0);
                    const total=(sub-disc)*(1+q.tax/100)+(q.shipping||0);
                    return <tr key={q.id}>
                      <td className="fm txs t3">#{q.id.slice(-6).toUpperCase()}</td>
                      <td className="fw6">{q.clientName}</td>
                      <td className="ts t2">{q.date}</td>
                      <td className="fm fw6 tc" style={{textAlign:"right"}}>{fmt(total)}</td>
                      <td><button className="btn bprp bic" onClick={()=>exportPDF(q,data.company)}><Ic d={I.pdf} s={13}/></button></td>
                    </tr>;
                  })}</tbody>
                </table></div>}
              </div>
            </div>
          )}

          {/* GUEST views */}
          {role==="guest" && view==="catalog" && <PublicCatalog products={data.products} company={data.company} quotes={data.quotes} setQuotes={data.setQuotes} clients={data.clients}/>}
        </main>

        {/* Cart sidebar (for installer and guest) */}
        {(role==="installer"||role==="guest"||role==="admin") && (
          <CartSidebar company={data.company} quotes={data.quotes} setQuotes={data.setQuotes} clients={data.clients} onQuoteSaved={()=>{}}/>
        )}

        {/* Modal de login — se abre desde el botón de la barra lateral */}
        {showLogin && !user && (
          <LoginScreen asModal={true} onGuestAccess={()=>setShowLogin(false)}/>
        )}
      </div>
    </CartProvider>
  );
}

// ─── Root render ──────────────────────────────────────────────────────────────
function App() {
  return (
    <AuthProvider>
      <AppShell/>
    </AuthProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
